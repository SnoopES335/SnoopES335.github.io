<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Realbook</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14202c">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Realbook">
<style>
  :root{
    --bg:#0f1720; --panel:#17222e; --panel2:#1e2b39; --line:#2b3b4d;
    --ink:#eef3f8; --sub:#9db0c2; --accent:#4aa3ff; --accent2:#2b7de0;
    --star:#ffc94a; --prac:#57c98b; --danger:#ff6b6b;
    --radius:12px; --tap:46px; --fs:17px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font:var(--fs)/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%;}

  #topbar{position:sticky;top:0;z-index:20;background:var(--bg)}
  header{background:linear-gradient(180deg,#1b2836,#14202c);
    border-bottom:1px solid #33475c;box-shadow:0 6px 18px rgba(0,0,0,.45);
    padding:12px 16px 0;padding-top:calc(12px + env(safe-area-inset-top));}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;width:max-content}
  .logo{width:40px;height:40px;border-radius:11px;flex:none;display:block;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .brand .word{font-size:22px;font-weight:800;letter-spacing:.3px}
  .brand .word b{color:var(--accent)}
  .brand .count{color:var(--sub);font-size:13px;font-weight:500;margin-top:2px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-bottom:12px}
  .tab{background:var(--panel2);color:var(--sub);border:1px solid var(--line);
    padding:9px 15px;border-radius:999px;font-size:14.5px;cursor:pointer;
    min-height:38px;display:flex;align-items:center;gap:7px;user-select:none;font-weight:600;}
  .tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .tab.tagtab{border-style:dashed}
  .tab.tagtab.active{border-style:solid}
  .tab .badge{background:rgba(255,255,255,.18);border-radius:999px;padding:0 7px;font-size:12px}
  .tab .dot{width:9px;height:9px;border-radius:50%}

  .controls{padding:12px 16px 10px;display:flex;flex-direction:column;gap:9px;background:var(--bg);
    box-shadow:0 8px 14px -8px rgba(0,0,0,.6);border-bottom:1px solid #23313f}
  input[type=search],input.txt,select{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:11px;padding:12px 14px;font-size:var(--fs);width:100%;min-height:var(--tap);}
  input::placeholder{color:#7c90a4}
  .lbl{color:var(--sub);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin:2px 2px -2px}
  .chiprow{display:flex;gap:7px;flex-wrap:wrap}
  .chiprow.scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .fchip{background:var(--panel2);border:1px solid var(--line);color:var(--sub);border-radius:999px;
    padding:7px 13px;font-size:14px;cursor:pointer;user-select:none;white-space:nowrap;min-height:36px;
    display:flex;align-items:center;gap:6px;font-weight:600}
  .fchip.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .azchip{min-width:34px;justify-content:center;padding:7px 8px}
  .filters{display:flex;gap:10px;flex-wrap:wrap}
  .filters>*{flex:1;min-width:150px}
  .hint{color:var(--sub);font-size:13px;padding:0 2px}
  .linkrow{display:flex;justify-content:space-between;align-items:center}
  .link{color:var(--accent);cursor:pointer;font-weight:600;font-size:13.5px}

  main{padding:6px 10px 130px}
  .group-letter{color:var(--sub);font-size:13px;font-weight:800;padding:16px 8px 4px;letter-spacing:1.5px}
  ul.list{list-style:none;margin:0;padding:0}
  li.tune{display:flex;align-items:center;gap:10px;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin:8px 0;}
  li.tune .main{flex:1;min-width:0;cursor:pointer}
  li.tune .title{font-weight:650;font-size:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  li.tune .meta{color:var(--sub);font-size:14px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  li.tune .meta .book{color:#84b6ea}
  .tagpills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .pill{font-size:11.5px;padding:2px 9px;border-radius:999px;font-weight:600;border:1px solid}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);border-radius:11px;
    width:var(--tap);height:var(--tap);min-width:var(--tap);display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:20px;color:var(--sub);user-select:none;}
  .iconbtn.on-star{color:var(--star);border-color:var(--star)}
  .iconbtn.on-prac{color:var(--prac);border-color:var(--prac)}
  .iconbtn.on-tag{color:var(--accent);border-color:var(--accent)}
  .iconbtn.add{font-size:24px;line-height:1}
  .empty{color:var(--sub);text-align:center;padding:44px 20px;font-size:16px}

  .viewer{position:fixed;inset:0;background:#0b1118;z-index:60;display:none;flex-direction:column}
  .viewer.open{display:flex}
  .vbar{display:flex;align-items:center;gap:9px;padding:11px 14px;
    padding-top:calc(11px + env(safe-area-inset-top));background:var(--panel);border-bottom:1px solid var(--line)}
  .vbar .vtitle{flex:1;min-width:0;font-weight:650;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vbar .vsub{color:var(--sub);font-size:13px;font-weight:400}
  .btn{background:var(--accent2);color:#fff;border:none;border-radius:11px;padding:0 16px;height:var(--tap);
    font-size:15px;font-weight:650;cursor:pointer;display:flex;align-items:center;gap:6px}
  .btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  .btn.sm{height:38px;padding:0 12px;font-size:13.5px}
  .btn:disabled{opacity:.4}
  .viewer .frame{flex:1;background:#525659}
  .viewer iframe{width:100%;height:100%;border:none;background:#525659}

  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:85;display:none}
  .sheet.open{display:block}
  .sheet .card{position:absolute;left:0;right:0;bottom:0;max-height:88%;overflow:auto;
    background:var(--panel);border-top-left-radius:20px;border-top-right-radius:20px;
    padding:18px 16px calc(26px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}
  .sheet h2{font-size:18px;margin:2px 0 14px}
  .row{display:flex;gap:10px;align-items:center;margin:10px 0;flex-wrap:wrap}
  .newrow input{flex:1}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:8px 14px;
    font-size:14.5px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .chip.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .muted{color:var(--sub);font-size:13.5px}
  .danger{color:var(--danger);cursor:pointer;font-weight:600}
  .handle{cursor:grab;touch-action:none;font-size:20px;color:var(--sub);
    width:var(--tap);height:var(--tap);min-width:var(--tap);display:flex;align-items:center;justify-content:center}
  li.tune.dragging{opacity:.85;border-color:var(--accent);box-shadow:0 8px 22px rgba(0,0,0,.5);background:var(--panel2)}
  .swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent}
  .swatch.sel{border-color:#fff}

  /* fit view */
  .fitwrap{width:100%;height:100%;display:flex;align-items:center;justify-content:flex-start;gap:14px;
    overflow-x:auto;overflow-y:hidden;background:#3a3d40;padding:10px}
  .fitwrap.center{justify-content:center}
  .fitwrap .pg{background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.5);flex:none}
  .fitwrap img.pg{display:block}

  /* annotation editor */
  .editor{position:fixed;inset:0;background:#20242a;z-index:70;display:none;flex-direction:column;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .editor.open{display:flex}
  .editor .etitle{-webkit-user-select:text;user-select:text}
  .ebar{display:flex;align-items:center;gap:8px;padding:9px 12px;flex-wrap:wrap;
    padding-top:calc(9px + env(safe-area-inset-top));background:var(--panel);border-bottom:1px solid var(--line)}
  .etitle{flex:0 1 240px;min-height:40px;padding:9px 12px}
  .etools{display:flex;gap:6px}
  .ebtn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:10px;
    height:40px;padding:0 12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
  .ebtn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .ebtn.on{outline:2px solid var(--accent)}
  .pen{width:34px;height:34px;border-radius:50%;border:2px solid #33475c;cursor:pointer}
  .pen.on{border-color:#fff;transform:scale(1.1)}
  .ecanvaswrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#3a3d40;padding:12px;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .estack{position:relative;background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.5);touch-action:none;
    -webkit-user-select:none;user-select:none;transform-origin:center center;will-change:transform}
  .estack canvas{position:absolute;left:0;top:0;display:block}
  .estack canvas.draw{touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .penw{width:34px;height:34px;border-radius:8px;border:2px solid #33475c;cursor:pointer;background:#2a2d30;display:flex;align-items:center;justify-content:center}
  .penw.on{border-color:#fff}
  .penw i{display:block;background:#cfe2f5;border-radius:999px}

  /* fullscreen (Vollbild) */
  .viewer.fullscreen .vbar{display:none}
  .fsclose{position:fixed;top:calc(10px + env(safe-area-inset-top));right:12px;z-index:80;display:none;
    width:46px;height:46px;border-radius:50%;border:none;background:rgba(20,28,38,.85);color:#fff;
    font-size:21px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.55)}
  .viewer.fullscreen .fsclose{display:flex}
  .viewer.fullscreen .frame{background:#3a3d40}
  /* Blätter-Pfeile im Vollbild */
  .fsnav{position:fixed;top:50%;transform:translateY(-50%);z-index:80;display:none;
    width:46px;height:66px;border:none;border-radius:12px;background:rgba(20,28,38,.5);color:#fff;
    font-size:28px;font-weight:700;cursor:pointer;align-items:center;justify-content:center}
  .fsnav.prev{left:8px} .fsnav.next{right:8px}
  .viewer.fullscreen .fsnav{display:flex}
  .fsnav[hidden]{display:none!important}
  .fsnav:disabled{opacity:.22}

  /* collapsible section headers (Bücher / Anfangsbuchstabe) – nebeneinander, kompakt */
  .collapse-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 2px 4px}
  .collapse-h{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
    padding:8px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--line)}
  .collapse-h:hover{border-color:var(--accent)}
  .collapse-h.open{border-color:var(--accent2)}
  .collapse-h .lbl{margin:0}
  .collapse-h .arrow{color:var(--sub);font-size:12px;transition:transform .18s}
  .collapse-h.open .arrow{transform:rotate(180deg)}
  #bookwrap.closed,#azwrap.closed{display:none}
  /* tag row in header */
  #tagtabs{margin-top:-2px;padding-bottom:12px}
  #tagtabs:empty{display:none}
  .tab.tagtab .badge{background:rgba(255,255,255,.16)}
  .tab.tagtab.active .badge{background:rgba(255,255,255,.28)}
  /* share/print icons in viewer buttons */
  .btn svg{display:block}
  /* Mehrfachauswahl */
  .selbox{width:26px;height:26px;min-width:26px;border-radius:7px;border:2px solid var(--line);flex:none;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:15px;background:var(--panel2);user-select:none}
  .selbox.on{background:var(--accent2);border-color:var(--accent2)}
  li.tune.selected{border-color:var(--accent2)}
  .selall{display:flex;align-items:center;gap:10px;color:var(--sub);font-size:14px;padding:8px 6px 0;cursor:pointer;user-select:none}
  .selall .selbox{width:22px;height:22px;min-width:22px;font-size:13px}
  .selbar{position:fixed;left:0;right:0;bottom:0;z-index:55;background:var(--panel);border-top:1px solid var(--line);
    padding:9px 10px calc(9px + env(safe-area-inset-bottom));display:none;flex-direction:column;gap:8px;box-shadow:0 -6px 20px rgba(0,0,0,.45)}
  .selbar.open{display:flex}
  .selbar-head{display:flex;align-items:center;gap:12px}
  .selbar-head .cnt{font-weight:700}
  .selbar-actions{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .selbar-actions .btn{flex:none;white-space:nowrap}
  .bookgroup{margin:0 0 4px}
  .gtitle{color:#7f97ad;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin:9px 2px 5px}

  /* tag manage zones */
  .tagzone{border:1.5px dashed var(--line);border-radius:12px;padding:10px;margin:4px 0 14px;min-height:54px;
    display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start}
  .tagzone.over{border-color:var(--accent);background:rgba(74,163,255,.10)}
  .tagcard{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);
    border-radius:999px;padding:7px 12px;cursor:grab;touch-action:none;user-select:none;font-weight:600;font-size:14px}
  .tagcard.dragging{opacity:.55}
  .tagcard .grip{color:var(--sub);font-size:14px;cursor:grab}
  .zonelbl{color:var(--sub);font-size:12px;font-weight:700;margin:4px 2px}
  .tagedit{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0}

  .tab:focus-visible,.fchip:focus-visible,.chip:focus-visible,.iconbtn:focus-visible,.link:focus-visible,
  .swatch:focus-visible,.tagcard:focus-visible,.handle:focus-visible,.collapse-h:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .filebanner{position:fixed;top:0;left:0;right:0;z-index:95;background:#7a2e12;color:#ffeede;
    padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));font-size:13.5px;line-height:1.4;
    display:flex;gap:12px;align-items:flex-start;box-shadow:0 2px 12px rgba(0,0,0,.55)}
  .filebanner b{color:#fff}
  .filebanner code{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:5px}
  .filebanner .x{margin-left:auto;cursor:pointer;font-size:18px;flex:none;line-height:1}

  @media(min-width:820px){
    :root{--fs:18px}
    main,.controls,header .inner{max-width:920px;margin-left:auto;margin-right:auto}
    header{padding-left:0;padding-right:0}
    header .inner{padding-left:16px;padding-right:16px}
  }
</style>
</head>
<body>
<div id="topbar">
<header>
 <div class="inner">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
  <div class="brand" id="home" title="Zur Startseite">
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Realbook">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3aa0ff"/><stop offset="1" stop-color="#1f5fbf"/></linearGradient></defs>
      <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#g)"/>
      <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>
      <path d="M20 32 C31 26 42 26 50 31 C58 26 69 26 80 32 L80 71 C69 65 58 65 50 70 C42 65 31 65 20 71 Z"
            fill="rgba(255,255,255,.14)" stroke="#fff" stroke-width="2.4" stroke-linejoin="round"/>
      <line x1="50" y1="31" x2="50" y2="70" stroke="#fff" stroke-width="2.4"/>
      <circle cx="62" cy="55" r="6.2" fill="#fff"/>
      <path d="M68 55 L68 33 L79 30" stroke="#fff" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </svg>
    <div><div class="word">Real<b>book</b></div><div class="count" id="count"></div></div>
  </div>
  <div style="display:flex;gap:8px;margin-left:auto">
    <div class="iconbtn" id="libBtn" title="Eigene Noten importieren & verwalten" style="background:rgba(255,255,255,.08);font-size:26px">＋</div>
    <div class="iconbtn" id="settingsBtn" title="Daten & Offline" style="background:rgba(255,255,255,.08);font-size:30px">⚙︎</div>
  </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="tabs" id="tagtabs"></div>
 </div>
</header>

<div class="controls" id="controls">
  <input type="search" id="q" placeholder="Suche: Titel, Komponist, Interpret…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" enterkeyhint="search">
  <div class="collapse-row">
    <div class="collapse-h" id="bookToggle" title="Bücher-Auswahl auf-/zuklappen"><div class="lbl">Bücher</div><span class="arrow">▾</span></div>
    <div class="collapse-h" id="azToggle" title="Anfangsbuchstaben auf-/zuklappen"><div class="lbl">Anfangsbuchstabe</div><span class="arrow">▾</span></div>
  </div>
  <div id="bookwrap" class="closed"><div id="bookbar"></div></div>
  <div id="azwrap" class="closed"><div class="chiprow scroll" id="azbar"></div></div>
  <div class="hint" id="hint"></div>
</div>
</div>

<main id="main"></main>

<div class="viewer" id="viewer">
  <div class="vbar">
    <div class="vtitle"><span id="vTitle"></span> <span class="vsub" id="vSub"></span></div>
    <div id="seqnav" style="display:none;gap:6px"></div>
    <button class="btn ghost" id="vFitBtn" title="Vollbild – ganze Seite, ohne Menüs">⛶ Vollbild</button>
    <button class="btn ghost" id="vEditBtn" title="Handschriftliche Notiz">✏️ Notiz</button>
    <button class="btn ghost" id="vMetaBtn" title="Titel &amp; Komponist korrigieren" style="display:none">✎ Titel</button>
    <button class="btn ghost" id="vShare" title="Teilen (Apple Share)"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M8 7l4-4 4 4"/><path d="M5 12v7a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-7"/></svg> Teilen</button>
    <button class="btn ghost" id="vPrint" title="Drucken">🖨 Drucken</button>
    <button class="btn ghost" id="vTab">↗</button>
    <button class="btn" id="vClose">Schließen</button>
  </div>
  <div class="frame">
    <iframe id="vFrame" title="Noten"></iframe>
    <div id="vFit" class="fitwrap" style="display:none"></div>
  </div>
  <button class="fsclose" id="vFsClose" title="Vollbild verlassen">✕</button>
  <button class="fsnav prev" id="vFsPrev" title="Vorheriges Stück">‹</button>
  <button class="fsnav next" id="vFsNext" title="Nächstes Stück">›</button>
</div>

<!-- Annotation editor -->
<div class="editor" id="editor">
  <div class="ebar">
    <input class="txt etitle" id="eTitle" placeholder="Titel der Notiz…" autocomplete="off">
    <div class="etools" id="ePens"></div>
    <div class="etools" id="eWidths"></div>
    <button class="ebtn" id="eHL" title="Textmarker">🖍</button>
    <button class="ebtn" id="eErase" title="Radierer">◧ Radierer</button>
    <button class="ebtn" id="eUndo" title="Rückgängig">↶</button>
    <div id="ePageNav" style="display:none;gap:6px;align-items:center"></div>
    <span style="flex:1"></span>
    <span id="eBuild" style="color:var(--sub);font-size:11px;opacity:.75;align-self:center;margin-right:8px"></span>
    <button class="ebtn" id="eCancel">Abbrechen</button>
    <button class="ebtn primary" id="eSave">Speichern</button>
  </div>
  <div class="ecanvaswrap" id="eStage"></div>
</div>
<pre id="eDiag" style="display:none;position:fixed;top:54px;left:8px;z-index:99999;background:rgba(0,0,0,.74);color:#3f6;font:11px/1.3 ui-monospace,Menlo,monospace;padding:8px 10px;border-radius:8px;max-height:62vh;overflow:hidden;white-space:pre;pointer-events:none;max-width:66vw;margin:0"></pre>

<div class="selbar" id="selbar">
  <div class="selbar-head"><span class="cnt" id="selCnt"></span><span class="link" id="selClear" style="margin-left:auto">Auswahl aufheben</span></div>
  <div class="selbar-actions" id="selActions"></div>
</div>

<div class="sheet" id="sheet"><div class="card" id="sheetCard"></div></div>

<script src="vendor/pdfjs/pdf.min.js"></script>
<script src="vendor/jszip/jszip.min.js"></script>
<script src="data.js"></script>
<script>
const PALETTE=['#e0662b','#2b7de0','#57c98b','#c94ad1','#e0b93a','#4ab5c9','#e0506b','#8b7de0','#7bc043','#d98cae'];
const S = {
  view:'all', q:'', initial:'', books:new Set(), comp:'', tagFilter:new Set(),
  fav:new Set(JSON.parse(localStorage.getItem('rb_fav')||'[]')),
  prac:new Set(JSON.parse(localStorage.getItem('rb_prac')||'[]')),
  sets:JSON.parse(localStorage.getItem('rb_sets')||'[]'),
  tags:JSON.parse(localStorage.getItem('rb_tags')||'[]'),          // [{id,name,color,pinned}]
  tuneTags:JSON.parse(localStorage.getItem('rb_tunetags')||'{}'),  // key -> [tagId]
  recent:JSON.parse(localStorage.getItem('rb_recent')||'{}'),      // key -> timestamp zuletzt gespielt
  recentSort:{by:'date',dir:'desc'},
  selection:new Set(),   // Mehrfachauswahl (nur Sitzung)
  _sig:'',
  sonstOn: localStorage.getItem('rb_sonston')!=='0',  // „Sonstiges Material" einbeziehen (Default an)
  openSet:null,
  booksOpen: localStorage.getItem('rb_booksopen')==='1',
  azOpen: localStorage.getItem('rb_azopen')==='1',
};
/* Standard-Buchauswahl: beim Öffnen der App wird diese Auswahl vorausgewählt. */
const DEFAULT_BOOKS = JSON.parse(localStorage.getItem('rb_defaultbooks')||'[]');
S.books = new Set(DEFAULT_BOOKS);
function setDefaultBooks(){ const arr=[...S.books]; localStorage.setItem('rb_defaultbooks', JSON.stringify(arr));
  DEFAULT_BOOKS.length=0; DEFAULT_BOOKS.push(...arr); render(); }
function clearDefaultBooks(){ localStorage.removeItem('rb_defaultbooks'); DEFAULT_BOOKS.length=0; render(); }
function booksAreDefault(){ if(DEFAULT_BOOKS.length!==S.books.size) return false; return DEFAULT_BOOKS.every(b=>S.books.has(b)); }
/* Metadaten-Korrektur der Großsammlung: Overrides je Stück (Titel/Komponist), PDFs bleiben unberührt.
   Schlüssel = ursprüngliche Identität (bid|Originaltitel|Seite), damit er auch nach Umbenennen stabil bleibt. */
const OVERRIDES = JSON.parse(localStorage.getItem('rb_overrides')||'{}');
function saveOverrides(){ localStorage.setItem('rb_overrides', JSON.stringify(OVERRIDES)); }
const TUNES = window.TUNES.map((t,i)=>{
  const key=t.bid+'|'+t.t+'|'+t.pg; const o=OVERRIDES[key];
  const base={...t, key, idx:i, _ot:t.t, _oc:t.c||''};
  if(o){ if(typeof o.t==='string' && o.t) base.t=o.t; if(typeof o.c==='string') base.c=o.c; }
  return base;
});
function applyOverride(key, patch){
  const t=byKey[key]; if(!t) return;
  const o=Object.assign({}, OVERRIDES[key]);
  if('t' in patch){ const v=(patch.t||'').trim(); if(v && v!==t._ot){ o.t=v; t.t=v; } else { delete o.t; t.t=t._ot; } }
  if('c' in patch){ const v=(patch.c||'').trim(); if(v!==(t._oc||'')){ o.c=v; t.c=v; } else { delete o.c; t.c=t._oc; } }
  if(Object.keys(o).length) OVERRIDES[key]=o; else delete OVERRIDES[key];
  saveOverrides(); rebuildByKey(); render();
}
let USER = JSON.parse(localStorage.getItem('rb_usertunes')||'[]');  // annotated copies (metadata; page images in IndexedDB)
let LIBTUNES = [];   // eigene importierte PDFs (Metadaten + Blob in IndexedDB, Store 'libtunes')
let USERBOOKS = JSON.parse(localStorage.getItem('rb_userbooks')||'[]'); // [{bid,name,chip,createdAt}]
let byKey = {};
function ALL(){ return TUNES.concat(USER).concat(LIBTUNES); }
function rebuildByKey(){ byKey={}; ALL().forEach(t=>byKey[t.key]=t); }
rebuildByKey();
function saveUser(){ localStorage.setItem('rb_usertunes', JSON.stringify(USER)); rebuildByKey(); }
function saveUserBooks(){ localStorage.setItem('rb_userbooks', JSON.stringify(USERBOOKS)); }
function userBook(bid){ return USERBOOKS.find(b=>b.bid===bid); }
function newId(pfx){ return (pfx||'id')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function libRecToTune(r){ return { key:'lib|'+r.id, libId:r.id, isLib:true, t:r.title||'(ohne Titel)', c:r.composer||'',
    pg:r.pg||'1', b:(userBook(r.bid)||{}).name||'Eigene Noten', bid:r.bid, np:r.np||1, addedAt:r.addedAt||0, f:r._url||'' }; }
async function loadLibrary(){
  let recs=[]; try{ recs=await libAll(); }catch(e){ recs=[]; }
  // alte Object-URLs freigeben
  LIBTUNES.forEach(t=>{ if(t.f && t.f.startsWith('blob:')) try{ URL.revokeObjectURL(t.f); }catch(_){}; });
  LIBTUNES = recs.map(r=>{ try{ r._url=URL.createObjectURL(r.blob); }catch(_){ r._url=''; } return libRecToTune(r); })
                 .sort((a,b)=> (a.t||'').localeCompare(b.t||'','de'));
  rebuildByKey();
}
/* ---- book display names + grouping (by bid; data.js unchanged) ---- */
const BOOKMETA={
  realbook1:{name:'Real Book - Vol. 1',chip:'Vol. 1'},
  realbook2:{name:'Real Book - Vol. 2',chip:'Vol. 2'},
  realbook3:{name:'Real Book - Vol. 3',chip:'Vol. 3'},
  realbook1_bb:{name:'Real Book - Vol. 1 - Bb',chip:'Vol. 1 · Bb'},
  realbook1_eb:{name:'Real Book - Vol. 1 - Eb',chip:'Vol. 1 · Eb'},
  realbook1_bass:{name:'Real Book - Vol. 1 - Bass',chip:'Vol. 1 · Bass'},
  realbook3_bb:{name:'Real Book - Vol. 3 - Bb',chip:'Vol. 3 · Bb'},
  realbook2_bass:{name:'Real Book - Vol. 2 - Bass',chip:'Vol. 2 · Bass'},
  newreal1:{name:'New Real Book - Vol. 1',chip:'Vol. 1'},
  newreal2:{name:'New Real Book - Vol. 2',chip:'Vol. 2'},
  newreal3:{name:'New Real Book - Vol. 3',chip:'Vol. 3'},
  wgfb:{name:"The World's Greatest Fake Book",chip:"World's Greatest"},
  enja:{name:'The Enja Book Of Jazz Originals',chip:'Enja Book'},
  latin:{name:'The Latin Real Book',chip:'Latin Real Book'},
  thebook:{name:'The Book (Commercial Fake Book)',chip:'The Book'},
  jazzltd:{name:'Jazz LTD',chip:'Jazz LTD'},
  legalmusician:{name:"The Original Musicians' Fake Book",chip:"Musicians' Fake Book"},
  user:{name:'Sonstiges Material',chip:'Sonstiges Material'},
};
const SONST_BID='user';
const BOOK_GROUPS=[
  {label:'Real Book', bids:['realbook1','realbook2','realbook3']},
  {label:'Real Book – transponiert', bids:['realbook1_bb','realbook1_eb','realbook1_bass','realbook3_bb','realbook2_bass']},
  {label:'New Real Book', bids:['newreal1','newreal2','newreal3']},
  {label:'Weitere Bücher', bids:['wgfb','enja','latin','thebook','jazzltd','legalmusician']},
  {label:'Eigenes', bids:['user']},
];
const PRESENT_BIDS=new Set(TUNES.map(t=>t.bid));
function bookName(t){ const m=BOOKMETA[t.bid]; if(m)return m.name; const u=userBook(t.bid); if(u)return u.name; return t.b||t.bid; }
function bookChip(bid){ const m=BOOKMETA[bid]; if(m)return m.chip; const u=userBook(bid); if(u)return u.chip||u.name; return bid; }
const ALLBOOKS=[...PRESENT_BIDS];

function save(){
  localStorage.setItem('rb_fav',JSON.stringify([...S.fav]));
  localStorage.setItem('rb_prac',JSON.stringify([...S.prac]));
  localStorage.setItem('rb_sets',JSON.stringify(S.sets));
  localStorage.setItem('rb_tags',JSON.stringify(S.tags));
  localStorage.setItem('rb_tunetags',JSON.stringify(S.tuneTags));
  localStorage.setItem('rb_recent',JSON.stringify(S.recent));
}
/* Metronom-Icon (SVG). on=true → gefüllt (aktiv). */
function metroIcon(on,size){ size=size||22; return `<svg class="metro" viewBox="0 0 24 24" width="${size}" height="${size}" fill="${on?'currentColor':'none'}" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M8.6 3.4h6.8l2.1 16.4a1.1 1.1 0 0 1-1.1 1.2H7.6a1.1 1.1 0 0 1-1.1-1.2z"/><path d="M11.7 20.6 14.9 6.2" stroke="${on?'#0b1118':'currentColor'}"/><circle cx="15.2" cy="5.6" r="1.15" fill="${on?'#0b1118':'currentColor'}" stroke="none"/></svg>`; }
function markPlayed(t){ if(!t||!t.key)return; S.recent[t.key]=Date.now(); localStorage.setItem('rb_recent',JSON.stringify(S.recent)); renderTabs(); }
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
  .replace(/^(the|a|an) /,'').replace(/[^a-z0-9 ]/g,'').trim();}
function initialOf(t){const c=(norm(t.t)[0]||'#');return /[0-9]/.test(c)?'#':c.toUpperCase();}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function tagById(id){return S.tags.find(x=>x.id===id);}
function tuneTagIds(key){return S.tuneTags[key]||[];}

/* ---- count ---- */
(function(){
  document.getElementById('count').textContent = TUNES.length+' Stücke · '+ALLBOOKS.length+(ALLBOOKS.length===1?' Buch':' Bücher');
})();

function matches(t){
  if(S.books.size && !S.books.has(t.bid)) return false;
  if(S.initial && initialOf(t)!==S.initial) return false;
  if(S.q){const q=norm(S.q); if(!norm(t.t).includes(q) && !norm(t.c).includes(q) && !norm(t.editor).includes(q)) return false;}
  if(S.tagFilter.size){const tt=tuneTagIds(t.key); if(![...S.tagFilter].some(id=>tt.includes(id))) return false;}
  return true;
}
function currentList(){
  let list=ALL().filter(matches);
  // „Sonstiges Material" ausblenden, wenn abgeschaltet (außer im Reiter „Bearbeitet" oder wenn gezielt gefiltert)
  if(!S.sonstOn && S.view!=='edited' && !S.books.has(SONST_BID)) list=list.filter(t=>t.bid!==SONST_BID);
  if(S.view==='fav') list=list.filter(t=>S.fav.has(t.key));
  else if(S.view==='prac') list=list.filter(t=>S.prac.has(t.key));
  else if(S.view==='edited'){ list=list.filter(t=>t.isEdit); list.sort((a,b)=>(b.editedAt||0)-(a.editedAt||0)); return list; }
  else if(S.view.startsWith('tag:')){const id=S.view.slice(4); list=list.filter(t=>tuneTagIds(t.key).includes(id));}
  list.sort((a,b)=>norm(a.t).localeCompare(norm(b.t))|| (a.b||bookName(a)||'').localeCompare(b.b||bookName(b)||''));
  return list;
}

/* ---------- top tabs (incl. pinned tags) ---------- */
function renderTabs(){
  const el=document.getElementById('tabs'); el.innerHTML='';
  const base=[
    ['all','Alle',null,''],
    ['fav','★ Favoriten',S.fav.size,''],
    ['prac','Üben',S.prac.size, metroIcon(false,15)],
    ['recent','🕒 Zuletzt', Object.keys(S.recent).length, ''],
    ['edited','✏️ Bearbeitet',USER.length,''],
    ['set','Setlists',S.sets.length,''],
  ];
  base.forEach(([v,label,badge,icon])=>{
    const d=document.createElement('div'); d.className='tab'+(S.view===v?' active':''); d.dataset.view=v;
    d.innerHTML=(icon||'')+esc(label)+(badge!=null?` <span class="badge">${badge}</span>`:'');
    d.onclick=()=>{S.view=v;S.openSet=null;render();}; el.append(d);
  });
  const mng=document.createElement('div'); mng.className='tab'; mng.style.borderStyle='dashed';
  mng.innerHTML='🏷 Tags verwalten';
  mng.onclick=manageTagsFlow; el.append(mng);
  renderTagTabs();
}
function tagCount(id){ let n=0; for(const k in S.tuneTags){ if((S.tuneTags[k]||[]).includes(id)) n++; } return n; }
function renderTagTabs(){
  const el=document.getElementById('tagtabs'); if(!el) return; el.innerHTML='';
  const tags=S.tags.filter(t=>t.pinned || tagCount(t.id)>0);
  tags.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0) || norm(a.name).localeCompare(norm(b.name)));
  tags.forEach(tag=>{
    const v='tag:'+tag.id;
    const d=document.createElement('div'); d.className='tab tagtab'+(S.view===v?' active':''); d.dataset.view=v;
    d.innerHTML=`<span class="dot" style="background:${tag.color}"></span>${esc(tag.name)} <span class="badge">${tagCount(tag.id)}</span>`;
    d.onclick=()=>{S.view=v;S.openSet=null;render();}; el.append(d);
  });
}

/* ---------- filter bars ---------- */
function renderAZ(){
  const bar=document.getElementById('azbar'); bar.innerHTML='';
  const present=new Set(ALL().map(initialOf));
  const letters=['#',...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')].filter(l=>present.has(l));
  letters.forEach(l=>{
    const c=document.createElement('div'); c.className='fchip azchip'+(S.initial===l?' active':''); c.textContent=l;
    c.onclick=()=>{S.initial=(S.initial===l?'':l);render();}; bar.append(c);
  });
}
function renderBooks(){
  const bar=document.getElementById('bookbar'); bar.innerHTML='';
  BOOK_GROUPS.forEach(g=>{
    const bids=g.bids.filter(b=>PRESENT_BIDS.has(b)||b===SONST_BID);
    if(!bids.length) return;
    const grp=document.createElement('div'); grp.className='bookgroup';
    const gt=document.createElement('div'); gt.className='gtitle'; gt.textContent=g.label; grp.append(gt);
    const row=document.createElement('div'); row.className='chiprow'; grp.append(row);
    bids.forEach(bid=>{
      const c=document.createElement('div'); c.className='fchip'+(S.books.has(bid)?' active':'');
      c.textContent=bookChip(bid); c.title=(BOOKMETA[bid]||{}).name||bid;
      c.onclick=()=>{S.books.has(bid)?S.books.delete(bid):S.books.add(bid);render();}; row.append(c);
    });
    bar.append(grp);
  });
  // Eigene Bücher (importierte PDFs) als eigene Gruppe
  if(USERBOOKS.length){
    const grp=document.createElement('div'); grp.className='bookgroup';
    const gt=document.createElement('div'); gt.className='gtitle'; gt.textContent='Eigene Bücher'; grp.append(gt);
    const row=document.createElement('div'); row.className='chiprow'; grp.append(row);
    USERBOOKS.forEach(ub=>{
      const cnt=LIBTUNES.filter(t=>t.bid===ub.bid).length;
      const c=document.createElement('div'); c.className='fchip'+(S.books.has(ub.bid)?' active':'');
      c.textContent=bookChip(ub.bid)+(cnt?' · '+cnt:''); c.title=ub.name;
      c.onclick=()=>{S.books.has(ub.bid)?S.books.delete(ub.bid):S.books.add(ub.bid);render();}; row.append(c);
    });
    bar.append(grp);
  }
  // Standard-Auswahl setzen/löschen
  const foot=document.createElement('div'); foot.className='bookgroup'; foot.style.marginTop='2px';
  const line=document.createElement('div'); line.className='chiprow'; line.style.cssText='gap:10px;align-items:center;flex-wrap:wrap';
  const isDef=booksAreDefault() && (DEFAULT_BOOKS.length>0 || S.books.size>0);
  const setBtn=document.createElement('button'); setBtn.id='bookDefaultBtn'; setBtn.className='btn ghost'; setBtn.style.cssText='padding:6px 12px';
  setBtn.textContent = isDef ? '✓ Ist der Standard' : '★ Auswahl als Standard';
  setBtn.disabled = isDef; if(isDef) setBtn.style.opacity='.6';
  setBtn.onclick=()=>setDefaultBooks();
  line.append(setBtn);
  if(DEFAULT_BOOKS.length){ const clr=document.createElement('span'); clr.className='link'; clr.textContent='Standard löschen'; clr.onclick=()=>clearDefaultBooks(); line.append(clr); }
  foot.append(line);
  const note=document.createElement('div'); note.className='muted'; note.style.marginTop='6px';
  note.textContent = DEFAULT_BOOKS.length
    ? 'Beim Öffnen wird diese Buch-Auswahl ('+DEFAULT_BOOKS.length+' '+(DEFAULT_BOOKS.length>1?'Bücher':'Buch')+') vorausgewählt.'
    : 'Kein Standard gesetzt – beim Öffnen sind alle Bücher aktiv.';
  foot.append(note);
  bar.append(foot);
}

/* ---------- list ---------- */
function tuneRow(t){
  const li=document.createElement('li'); li.className='tune'; li.dataset.key=t.key;
  const star=S.fav.has(t.key), prac=S.prac.has(t.key);
  const tt=tuneTagIds(t.key); const hasTags=tt.length>0;
  const pages = t.np>1 ? ' · '+t.np+' S.' : '';
  const pillsHTML = hasTags? '<div class="tagpills">'+tt.map(id=>{const tg=tagById(id);return tg?`<span class="pill" style="color:${tg.color};border-color:${tg.color};background:${tg.color}22">${esc(tg.name)}</span>`:''}).join('')+'</div>':'';
  let metaHTML;
  if(t.isEdit){ const d=t.editedAt?new Date(t.editedAt).toLocaleDateString('de-DE'):'';
    metaHTML=`✏️ ${t.editor?esc(t.editor)+' · ':''}<span class="book">${esc(bookName(t))}</span>${d?' · '+d:''}${pages}`; }
  else metaHTML=`${t.c?esc(t.c)+' · ':''}<span class="book">${esc(bookName(t))}</span> · S. ${esc(t.pg)}${pages}`;
  li.innerHTML=`
    <div class="main">
      <div class="title">${esc(t.t)}</div>
      <div class="meta">${metaHTML}${window.voiceBadges?window.voiceBadges(t):''}</div>
      ${pillsHTML}
    </div>
    <div class="iconbtn" data-a="meta" title="Titel & Komponist bearbeiten">✎</div>
    <div class="iconbtn ${hasTags?'on-tag':''}" data-a="tag" title="Tags">🏷</div>
    <div class="iconbtn add" title="Zu Setlist">＋</div>
    <div class="iconbtn ${prac?'on-prac':''}" data-a="prac" title="Üben">${metroIcon(prac)}</div>
    <div class="iconbtn ${star?'on-star':''}" data-a="star" title="Favorit">${star?'★':'☆'}</div>`;
  li.querySelector('.main').onclick=()=>openViewer(t);
  const meBtn=li.querySelector('[data-a=meta]'); if(meBtn) meBtn.onclick=()=>openMetaSheet(t);
  li.querySelector('[data-a=tag]').onclick=()=>assignTagsFlow(t);
  li.querySelector('.add').onclick=()=>addToSetlistFlow(t);
  li.querySelector('[data-a=prac]').onclick=()=>toggle(S.prac,t.key);
  li.querySelector('[data-a=star]').onclick=()=>toggle(S.fav,t.key);
  li.prepend(selBox(t.key)); if(S.selection.has(t.key)) li.classList.add('selected');
  return li;
}
function toggle(set,key){ set.has(key)?set.delete(key):set.add(key); save(); render(); }

/* ---------- Mehrfachauswahl ---------- */
function cssEsc(s){ return (window.CSS&&CSS.escape)?CSS.escape(s):String(s).replace(/["\\]/g,'\\$&'); }
function selBox(key){
  const b=document.createElement('div'); const on=S.selection.has(key);
  b.className='selbox'+(on?' on':''); b.innerHTML=on?'✓':''; b.title='Auswählen';
  b.onclick=e=>{ e.stopPropagation(); toggleSel(key); };
  return b;
}
function toggleSel(key){
  if(S.selection.has(key)) S.selection.delete(key); else S.selection.add(key);
  const li=document.querySelector('li.tune[data-key="'+cssEsc(key)+'"]');
  if(li){ const on=S.selection.has(key); li.classList.toggle('selected',on);
    const b=li.querySelector('.selbox'); if(b){ b.classList.toggle('on',on); b.innerHTML=on?'✓':''; } }
  renderSelBar();
}
function refreshSelUI(){
  document.querySelectorAll('li.tune').forEach(li=>{ const on=S.selection.has(li.dataset.key);
    li.classList.toggle('selected',on); const b=li.querySelector('.selbox'); if(b){ b.classList.toggle('on',on); b.innerHTML=on?'✓':''; } });
  document.querySelectorAll('.selall').forEach(r=>r.dispatchEvent(new CustomEvent('rf')));
  renderSelBar();
}
function selectAllRow(keys){
  const row=document.createElement('div'); row.className='selall';
  const b=document.createElement('div'); b.className='selbox'; const t=document.createElement('span');
  const sync=()=>{ const all=keys.length&&keys.every(k=>S.selection.has(k));
    b.classList.toggle('on',all); b.innerHTML=all?'✓':''; t.textContent=(all?'Auswahl aufheben':'Alle auswählen')+' ('+keys.length+')'; };
  row.append(b,t); sync(); row.addEventListener('rf',sync);
  row.onclick=()=>{ const all=keys.length&&keys.every(k=>S.selection.has(k));
    if(all) keys.forEach(k=>S.selection.delete(k)); else keys.forEach(k=>S.selection.add(k)); refreshSelUI(); };
  return row;
}
function hasSelectedNotes(){ return [...S.selection].some(k=>byKey[k]&&byKey[k].isEdit); }
function renderSelBar(){
  const bar=document.getElementById('selbar'), n=S.selection.size;
  document.getElementById('selCnt').textContent=n+' ausgewählt';
  const act=document.getElementById('selActions'); act.innerHTML='';
  if(!n){ bar.classList.remove('open'); return; }
  const mk=(html,fn)=>{ const b=document.createElement('button'); b.className='btn ghost sm'; b.innerHTML=html; b.onclick=fn; act.append(b); };
  mk('＋ Setlist', bulkSetlistFlow);
  mk('Üben ＋', ()=>bulkSet(S.prac,true));
  mk('Üben −', ()=>bulkSet(S.prac,false));
  mk('★ ＋', ()=>bulkSet(S.fav,true));
  mk('★ −', ()=>bulkSet(S.fav,false));
  mk('🏷 Tags', bulkTagsFlow);
  mk('⤴ Teilen', bulkShare);
  mk('🖨 Drucken', bulkPrint);
  if(S.view==='set' && S.openSet) mk('Aus Setlist entfernen', bulkRemoveFromSet);
  if(hasSelectedNotes()) mk('🗑 Notiz löschen', bulkDeleteNotes);
  bar.classList.add('open'); a11y(bar);
}
document.getElementById('selClear').onclick=()=>{ S.selection.clear(); refreshSelUI(); };
function bulkSet(ref,add){ [...S.selection].forEach(k=> add?ref.add(k):ref.delete(k)); save(); render(); }
function bulkRemoveFromSet(){ const st=S.sets.find(s=>s.id===S.openSet); if(!st)return;
  st.items=st.items.filter(k=>!S.selection.has(k)); st.updatedAt=Date.now(); S.selection.clear(); save(); render(); }
function bulkDeleteNotes(){
  const notes=[...S.selection].map(k=>byKey[k]).filter(t=>t&&t.isEdit); if(!notes.length){ alert('Nur eigene handschriftliche Notizen können gelöscht werden.'); return; }
  if(!confirm(notes.length+' Notiz(en) endgültig löschen? Das lässt sich nicht rückgängig machen.')) return;
  notes.forEach(t=>{ try{ idbDeletePages(t.key); }catch(e){} USER=USER.filter(u=>u.key!==t.key);
    delete S.recent[t.key]; S.fav.delete(t.key); S.prac.delete(t.key); delete S.tuneTags[t.key];
    S.sets.forEach(st=>st.items=st.items.filter(k=>k!==t.key)); });
  S.selection.clear(); saveUser(); save(); render();
}
function bulkSetlistFlow(){
  const keys=[...S.selection]; if(!keys.length)return;
  openSheet(card=>{
    card.innerHTML=`<h2>${keys.length} Stücke zu Setlist</h2>`;

async function bulkShare(){
  const items=[...S.selection].map(k=>byKey[k]).filter(Boolean); if(!items.length)return;

    if(files.length && navigator.canShare && navigator.canShare({files})){ await navigator.share({files, title:items.length+' Stücke'}); return; }
    if(navigator.share){ await navigator.share({title:items.length+' Stücke', text:items.map(t=>t.t).join(', ')}); return; }
  }catch(e){ if(e&&e.name==='AbortError')return; }
  alert('Teilen ist hier nicht verfügbar (nur über localhost/Netlify bzw. die installierte App). Ich öffne stattdessen den Druck-Dialog.');

}

let CURRENT=null, fitOn=false;
let LISTNAV=[];               // Keys der aktuell angezeigten Liste (Kontext-Blättern)
let NAV={keys:[],idx:0};      // aktueller Blätter-Kontext im Betrachter
function openViewer(t, keepNav){
  CURRENT=t; fitOn=false;
  if(!keepNav){ const i=LISTNAV.indexOf(t.key); NAV = (i>=0)?{keys:LISTNAV.slice(), idx:i} : {keys:[t.key], idx:0}; }
  document.getElementById('vTitle').textContent=t.t;

    ? ('✏️ '+(t.editor||'')+(t.editedAt?' — '+new Date(t.editedAt).toLocaleString('de-DE'):''))
    : t.isLib ? ((t.c?t.c+' — ':'')+t.b)
    : ((t.c?t.c+' — ':'')+t.b+', S. '+t.pg);
  const frame=document.getElementById('vFrame'), fit=document.getElementById('vFit');
  document.getElementById('viewer').classList.remove('fullscreen'); fitOn=false;
  resetFrameStyle();
  document.getElementById('vFitBtn').classList.remove('on');
  document.getElementById('vFitBtn').style.display='flex';
  document.getElementById('vEditBtn').style.display = t.isEdit ? 'none':'flex';
  const vMeta=document.getElementById('vMetaBtn');
  vMeta.style.display = 'flex';                                     // Titel/Komponist – Großsammlung, importierte Stücke UND Notizen
  vMeta.onclick=()=>openMetaSheet(t);
  const vt=document.querySelector('.vtitle');                       // Titel/Komponist direkt antippbar
  if(vt){ vt.style.cursor='pointer'; vt.title='Titel & Komponist bearbeiten'; vt.onclick=()=>openMetaSheet(CURRENT); }
  document.getElementById('vShare').onclick=()=>shareTune(t);

  if(t.isEdit){
    frame.style.display='none'; frame.src='about:blank';
    fit.style.display='flex'; document.getElementById('vTab').style.display='none';
    renderUserFit(t);
  } else if(t.isLib){
    // Importiertes PDF: direkt über PDF.js (Blob) einpassen – zuverlässiger als Blob im Iframe (Safari)
    frame.style.display='none'; frame.src='about:blank';
    fit.style.display='flex'; document.getElementById('vTab').style.display='none';
    fitOn=true; renderPdfFit(t);
  } else {
    fit.style.display='none'; fit.innerHTML='';
    frame.style.display='block'; frame.src=encodeURI(t.f)+'#toolbar=1&view=FitH';
    document.getElementById('vTab').style.display='flex';
    document.getElementById('vTab').onclick=()=>window.open(encodeURI(t.f),'_blank');
  }
  updateNavUI();
  document.getElementById('viewer').classList.add('open');
  markPlayed(t);
}
function updateNavUI(){
  const multi=NAV.keys.length>1;
  const nav=document.getElementById('seqnav');
  if(!multi){ nav.style.display='none'; nav.innerHTML=''; }
  else{
    nav.style.display='flex';
    nav.innerHTML='<button class="btn ghost" id="navPrev" title="Vorheriges">‹</button>'
      +'<span id="navPos" style="align-self:center;color:var(--sub);font-size:13px;white-space:nowrap"></span>'
      +'<button class="btn ghost" id="navNext" title="Nächstes">›</button>';
    document.getElementById('navPos').textContent=(NAV.idx+1)+' / '+NAV.keys.length;
    const pv=document.getElementById('navPrev'), nx=document.getElementById('navNext');
    pv.disabled=NAV.idx<=0; nx.disabled=NAV.idx>=NAV.keys.length-1;
    pv.onclick=()=>navGo(-1); nx.onclick=()=>navGo(1);
  }
  const fp=document.getElementById('vFsPrev'), fn=document.getElementById('vFsNext');
  fp.hidden=!multi; fn.hidden=!multi;
  fp.disabled=NAV.idx<=0; fn.disabled=NAV.idx>=NAV.keys.length-1;
}
function navGo(delta){
  if(NAV.keys.length<2) return;
  const i=NAV.idx+delta; if(i<0||i>=NAV.keys.length) return;
  const wasFull=document.getElementById('viewer').classList.contains('fullscreen');
  NAV={keys:NAV.keys, idx:i}; const t=byKey[NAV.keys[i]]; if(!t) return;
  openViewer(t, true);
  if(wasFull) enterFullscreen();
}
document.getElementById('vFsPrev').onclick=()=>navGo(-1);
document.getElementById('vFsNext').onclick=()=>navGo(1);
/* horizontales Wischen im Vollbild-Betrachter */
(function(){
  const el=document.getElementById('vFit'); let x0=null,y0=null,t0=0;
  el.addEventListener('touchstart',e=>{ if(e.touches.length!==1){x0=null;return;} x0=e.touches[0].clientX; y0=e.touches[0].clientY; t0=Date.now(); },{passive:true});
  el.addEventListener('touchend',e=>{ if(x0==null)return; const c=e.changedTouches[0]; const dx=c.clientX-x0, dy=c.clientY-y0; x0=null;
    if(Date.now()-t0>700) return; if(Math.abs(dx)<55 || Math.abs(dx)<Math.abs(dy)*1.4) return; navGo(dx<0?1:-1); },{passive:true});
})();
/* Pfeiltasten links/rechts blättern (funktionieren, wenn nicht in der Nativ-PDF-Ansicht fokussiert) */
document.addEventListener('keydown',e=>{
  if(!document.getElementById('viewer').classList.contains('open')) return;
  if(e.key==='ArrowRight'){ e.preventDefault(); navGo(1); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); navGo(-1); }

/* ---------- Teilen (Web Share) + Drucken ---------- */
function safeName(s){ return (s||'Stück').replace(/[\/\\:*?"<>|]+/g,' ').replace(/\s+/g,' ').trim().slice(0,80); }
async function fetchAsFile(t){
  if(t.isEdit){ const pages=await idbGetPages(t.key); if(!pages.length) return null;
    const bl=await (await fetch(pages[0])).blob(); return new File([bl], safeName(t.t)+'.png',{type:'image/png'}); }
  const bl=await (await fetch(encodeURI(t.f))).blob(); return new File([bl], safeName(t.t)+'.pdf',{type:'application/pdf'});
}
async function shareTune(t){
  if(!t) return;
  const title=t.t, url=new URL(encodeURI(t.f), location.href).href;
  // 1) Datei teilen (iPad/iPhone + neuere macOS): öffnet den Apple-Share-Dialog inkl. Drucken
  try{ const f=await fetchAsFile(t);
    if(f && navigator.canShare && navigator.canShare({files:[f]})){ await navigator.share({files:[f], title}); return; } }
  catch(e){ if(e && e.name==='AbortError') return; }
  // 2) URL teilen (öffnet auch auf dem Mac den Apple-Share-Dialog)
  try{ if(navigator.share){ await navigator.share({title, url}); return; } }
  catch(e){ if(e && e.name==='AbortError') return; }
  // 3) Web Share nicht verfügbar (z. B. Doppelklick/file://)
  alert('Teilen ist hier nicht verfügbar – es funktioniert in der installierten App bzw. über die gehostete Adresse (Netlify) oder localhost. Ich öffne stattdessen den Druck-Dialog.');
  printCurrent(t);
}
function printCurrent(t){
  if(!t) return;
  if(t.isEdit){ printImages(t); return; }
  const frame=document.getElementById('vFrame');
  try{ if(frame && frame.style.display!=='none' && frame.contentWindow){ frame.contentWindow.focus(); frame.contentWindow.print(); return; } }catch(e){}
  const w=window.open(encodeURI(t.f),'_blank'); try{ w&&w.addEventListener&&w.addEventListener('load',()=>{try{w.print();}catch(e){}}); }catch(e){}
}
async function shareSetlist(st){
  const items=st.items.map(k=>byKey[k]).filter(Boolean); if(!items.length) return;
  try{
    const files=[];
    for(const t of items){ if(t.isEdit) continue; const bl=await (await fetch(encodeURI(t.f))).blob();
      files.push(new File([bl], safeName(t.t)+'.pdf',{type:'application/pdf'})); }
    if(files.length && navigator.canShare && navigator.canShare({files})){ await navigator.share({files, title:st.name}); return; }
    if(navigator.share){ await navigator.share({title:st.name, text:st.name}); return; }
  }catch(e){ if(e && e.name==='AbortError') return; }
  printSetlist(st);
}

function openTagEditor(tag){
  openSheet(card=>{
    card.innerHTML=`<h2>Tag „${esc(tag.name)}"</h2>`;
    const ed=document.createElement('div'); ed.className='tagedit';
    ed.innerHTML='<div class="lbl" style="margin:0 0 6px">Name</div><input class="txt" id="tn" value="'+esc(tag.name)+'">'
      +'<div class="lbl" style="margin:12px 0 6px">Farbe</div><div class="row" id="cols" style="margin:0;gap:7px;flex-wrap:wrap"></div>';
    card.append(ed);
    const cols=ed.querySelector('#cols');
    PALETTE.forEach(col=>{const s=document.createElement('div');s.className='swatch'+(col===tag.color?' sel':'');s.style.background=col;
      s.onclick=()=>{tag.color=col;tag.updatedAt=Date.now();save();cols.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');render();};cols.append(s);});
    const nm=ed.querySelector('#tn');
    const commit=()=>{const v=nm.value.trim();if(v){tag.name=v;tag.updatedAt=Date.now();save();render();}};
    nm.addEventListener('change',commit); nm.addEventListener('keydown',e=>{if(e.key==='Enter'){commit();manageTagsFlow();}});

    info.textContent=count+' Stück'+(count===1?'':'e')+' mit diesem Tag · '+(tag.pinned?'Favorit (Menüleiste)':'nicht angeheftet'); card.append(info);
    const r=document.createElement('div'); r.className='row'; r.style.marginTop='8px';

function setupTagDnD(card){
  const zones=[...card.querySelectorAll('.tagzone')]; let d=null;
  function zoneAt(x,y){ return zones.find(z=>{const r=z.getBoundingClientRect(); return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom;}); }
  function move(e){ if(!d)return; d.moved=true; const z=zoneAt(e.clientX,e.clientY); zones.forEach(zz=>zz.classList.toggle('over',zz===z)); }
  function up(e){ if(!d)return; const z=zoneAt(e.clientX,e.clientY);
    zones.forEach(zz=>zz.classList.remove('over')); d.el.classList.remove('dragging');
    window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); window.removeEventListener('pointercancel',up);
    const id=d.id, moved=d.moved; d=null;
    if(z && moved){ const tag=tagById(id); const want=z.dataset.pinned==='1';
      if(tag && !!tag.pinned!==want){ tag.pinned=want; tag.updatedAt=Date.now(); save(); manageTagsFlow(); render(); } }
  }
  card.querySelectorAll('.tagcard').forEach(el=>{
    el.addEventListener('pointerdown',e=>{ if(e.target.closest('[data-e=edit]'))return; if(d)return; e.preventDefault();
      d={el,id:el.dataset.tag,moved:false}; el.classList.add('dragging');
      window.addEventListener('pointermove',move); window.addEventListener('pointerup',up); window.addEventListener('pointercancel',up); });
  });
}

let drag=null;
function enableDrag(li, st){
  const h=li.querySelector('.handle');
  h.addEventListener('pointerdown',e=>{e.preventDefault();if(drag)return;
    drag={li,st,h};li.classList.add('dragging');h.style.cursor='grabbing';
    window.addEventListener('pointermove',onDragMove);window.addEventListener('pointerup',onDragEnd);window.addEventListener('pointercancel',onDragEnd);});
}
function onDragMove(e){if(!drag)return;e.preventDefault();
  const li=drag.li,ul=li.parentElement,y=e.clientY;
  const sib=[...ul.children].filter(x=>x!==li);let placed=false;
  for(const s of sib){const r=s.getBoundingClientRect();if(y<r.top+r.height/2){ul.insertBefore(li,s);placed=true;break;}}
  if(!placed)ul.appendChild(li);}
function onDragEnd(){if(!drag)return;const li=drag.li,ul=li.parentElement;
  li.classList.remove('dragging');drag.h.style.cursor='grab';
  drag.st.items=[...ul.children].map(x=>x.dataset.key);drag.st.updatedAt=Date.now();
  window.removeEventListener('pointermove',onDragMove);window.removeEventListener('pointerup',onDragEnd);window.removeEventListener('pointercancel',onDragEnd);
  drag=null;save();render();}

function exportData(){
  const data={schema:1, app:'realbook', exportedAt:new Date().toISOString(),
    fav:[...S.fav], prac:[...S.prac], sets:S.sets, tags:S.tags, tuneTags:S.tuneTags};
  const blob=new Blob([JSON.stringify(data,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const d=new Date(); const stamp=d.toISOString().slice(0,10);
  a.download='realbook-daten-'+stamp+'.json'; document.body.append(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function mergeState(obj){
  if(!obj||typeof obj!=='object') throw new Error('Ungültige Datei');
  (obj.fav||[]).forEach(k=>S.fav.add(k));
  (obj.prac||[]).forEach(k=>S.prac.add(k));
  const setById=Object.fromEntries(S.sets.map(s=>[s.id,s]));
  (obj.sets||[]).forEach(s=>{const ex=setById[s.id];
    if(!ex){S.sets.push(s);setById[s.id]=s;} else if((s.updatedAt||0)>(ex.updatedAt||0)){Object.assign(ex,s);}});
  const tagById2=Object.fromEntries(S.tags.map(t=>[t.id,t]));
  (obj.tags||[]).forEach(t=>{const ex=tagById2[t.id];
    if(!ex){S.tags.push(t);tagById2[t.id]=t;} else if((t.updatedAt||0)>(ex.updatedAt||0)){Object.assign(ex,t);}});
  const inTags=id=>S.tags.some(t=>t.id===id);
  for(const k in (obj.tuneTags||{})){const cur=new Set(S.tuneTags[k]||[]);
    obj.tuneTags[k].forEach(id=>cur.add(id));
    const arr=[...cur].filter(inTags); if(arr.length)S.tuneTags[k]=arr; else delete S.tuneTags[k];}
  save(); render();
}
function importData(file){
  const r=new FileReader();
  r.onload=()=>{ try{ const obj=JSON.parse(r.result);
      const before={sets:S.sets.length,tags:S.tags.length};
      mergeState(obj);
      alert('Import zusammengeführt.\nSetlists: '+before.sets+' → '+S.sets.length+'\nTags: '+before.tags+' → '+S.tags.length);
      closeSheet();
    }catch(e){ alert('Import fehlgeschlagen: '+e.message); } };
  r.readAsText(file);
}
/* ---- Baustein 2: Einstellungen als EINZELNE Dateien (je mit Versionskennung) ---- */
const PART_META={ setlists:{label:'Setlists',file:'setlists'}, tags:{label:'Tags',file:'tags'},
  favorites:{label:'Favoriten',file:'favoriten'}, practice:{label:'Üben-Liste',file:'ueben'} };
function partPayload(kind){
  const base={schema:1, app:'realbook', kind, exportedAt:new Date().toISOString()};
  if(kind==='setlists') return {...base, sets:S.sets};
  if(kind==='tags')     return {...base, tags:S.tags, tuneTags:S.tuneTags};
  if(kind==='favorites')return {...base, fav:[...S.fav]};
  if(kind==='practice') return {...base, prac:[...S.prac]};
  return base;
}
function downloadJSON(obj, name){
  const blob=new Blob([JSON.stringify(obj,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=name; document.body.append(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function exportPart(kind){ const m=PART_META[kind]; if(!m) return;
  downloadJSON(partPayload(kind), 'realbook-'+m.file+'-'+new Date().toISOString().slice(0,10)+'.json'); }
/* Merge-Bausteine: neuere Version gewinnt (updatedAt); Favoriten/Üben = Vereinigung */
function mergeSets(arr){ const by=Object.fromEntries(S.sets.map(s=>[s.id,s])); let added=0,updated=0;
  (arr||[]).forEach(s=>{ if(!s||!s.id)return; const ex=by[s.id];
    if(!ex){ S.sets.push(s); by[s.id]=s; added++; }
    else if((s.updatedAt||0)>(ex.updatedAt||0)){ Object.assign(ex,s); updated++; } });
  return {added,updated}; }
function mergeTags(tags,tuneTags){ const by=Object.fromEntries(S.tags.map(t=>[t.id,t])); let added=0,updated=0;
  (tags||[]).forEach(t=>{ if(!t||!t.id)return; const ex=by[t.id];
    if(!ex){ S.tags.push(t); by[t.id]=t; added++; }
    else if((t.updatedAt||0)>(ex.updatedAt||0)){ Object.assign(ex,t); updated++; } });
  const inTags=id=>S.tags.some(t=>t.id===id);
  for(const k in (tuneTags||{})){ const cur=new Set(S.tuneTags[k]||[]);
    (tuneTags[k]||[]).forEach(id=>cur.add(id)); const a=[...cur].filter(inTags);
    if(a.length)S.tuneTags[k]=a; else delete S.tuneTags[k]; }
  return {added,updated}; }
function importPart(file){
  const r=new FileReader();
  r.onload=()=>{ try{
      const obj=JSON.parse(r.result);
      if(!obj||typeof obj!=='object') throw new Error('Ungültige Datei');
      let msg;
      if(obj.kind==='setlists'){ const b=S.sets.length; const {added,updated}=mergeSets(obj.sets);
        msg='Setlists: '+b+' → '+S.sets.length+' ('+added+' neu, '+updated+' aktualisiert)'; }
      else if(obj.kind==='tags'){ const b=S.tags.length; const {added,updated}=mergeTags(obj.tags,obj.tuneTags);
        msg='Tags: '+b+' → '+S.tags.length+' ('+added+' neu, '+updated+' aktualisiert)'; }
      else if(obj.kind==='favorites'){ const b=S.fav.size; (obj.fav||[]).forEach(k=>S.fav.add(k));
        msg='Favoriten: '+b+' → '+S.fav.size; }
      else if(obj.kind==='practice'){ const b=S.prac.size; (obj.prac||[]).forEach(k=>S.prac.add(k));
        msg='Üben-Liste: '+b+' → '+S.prac.size; }
      else { mergeState(obj); msg='Gesamtdatei zusammengeführt (Setlists '+S.sets.length+', Tags '+S.tags.length+').'; }
      save(); render();
      alert('Import zusammengeführt.\n'+msg);
      closeSheet();
    }catch(e){ alert('Import fehlgeschlagen: '+e.message); } };
  r.readAsText(file);
}
let precacheState={running:false,done:0,total:0};
navigator.serviceWorker && navigator.serviceWorker.addEventListener('message', e=>{
  const m=e.data||{};
  if(m.type==='PRECACHE_PROGRESS'){precacheState={running:true,done:m.done,total:m.total}; updatePrecacheUI();}
  if(m.type==='PRECACHE_DONE'){precacheState={running:false,done:m.total,total:m.total}; updatePrecacheUI(true);}
});
function updatePrecacheUI(done){
  const el=document.getElementById('precacheStatus'); if(!el)return;
  if(done) el.textContent='✓ Alle '+precacheState.total+' Noten sind offline gespeichert.';
  else el.textContent='Speichere… '+precacheState.done+' / '+precacheState.total;
}
function precacheAll(){
  if(!('serviceWorker' in navigator) || !navigator.serviceWorker.controller){
    alert('Offline-Speicher ist erst nach der Installation (bzw. einem Neuladen der Seite) aktiv.'); return; }
  precacheState={running:true,done:0,total:TUNES.length}; updatePrecacheUI();
  navigator.serviceWorker.controller.postMessage({type:'PRECACHE_ALL', urls:TUNES.map(t=>t.f)});
}

/* ---------- Eigene Noten: Bücher anlegen, PDFs importieren, verwalten ---------- */
function createBook(name){ name=(name||'').trim(); if(!name) return null;
  const bid=newId('ub'); const chip=name.length>18?name.slice(0,16)+'…':name;
  USERBOOKS.push({bid,name,chip,createdAt:Date.now()}); saveUserBooks(); return bid; }
async function deleteBook(bid){ const ub=userBook(bid); if(!ub) return;
  const own=LIBTUNES.filter(t=>t.bid===bid);
  if(!confirm('Buch „'+ub.name+'" löschen'+(own.length?' – samt '+own.length+' Stück'+(own.length>1?'en':'')+'?':'?'))) return;
  for(const t of own){ try{ await libDelete(t.libId); }catch(e){} }
  USERBOOKS=USERBOOKS.filter(b=>b.bid!==bid); saveUserBooks(); S.books.delete(bid);
  await loadLibrary(); render(); openLibrarySheet(); }
async function importPdfs(bid, files){
  let ok=0;
  for(const file of files){
    if(!/pdf$/i.test(file.type||'') && !/\.pdf$/i.test(file.name||'')) continue;
    let np=1; try{ const buf=await file.arrayBuffer(); const doc=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise; np=doc.numPages; }catch(e){}
    const id=newId('lt'); const title=(file.name||'Stück').replace(/\.pdf$/i,'').trim()||'Stück';
    try{ await libPut({id,bid,title,composer:'',addedAt:Date.now(),np,fileName:file.name,blob:file}); ok++; }catch(e){ alert('Import fehlgeschlagen: '+e.message); }
  }
  await loadLibrary(); render(); openLibrarySheet();
  return ok;
}
async function saveLibMeta(id, patch){
  // Atomares Lesen+Schreiben in EINER Transaktion: verhindert, dass ein verzögertes
  // Speichern (z. B. beim Verlassen des Feldes) ein gerade gelöschtes Stück wieder aufleben lässt.
  const db=await idb();
  await new Promise((res,rej)=>{ const tx=db.transaction(IDB_LIB,'readwrite'), st=tx.objectStore(IDB_LIB);
    const g=st.get(id); g.onsuccess=()=>{ const r=g.result; if(r){ Object.assign(r,patch); st.put(r); } };
    tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); });
  await loadLibrary(); render();
}
async function deleteLibTune(id){ const t=LIBTUNES.find(x=>x.libId===id);
  if(!confirm('„'+((t&&t.t)||'Stück')+'" löschen?')) return;
  try{ await libDelete(id); }catch(e){ alert('Löschen fehlgeschlagen: '+e.message); return; }
  S.fav.delete('lib|'+id); S.prac.delete('lib|'+id); delete S.tuneTags['lib|'+id];
  S.sets.forEach(st=>st.items=st.items.filter(k=>k!=='lib|'+id)); save();
  await loadLibrary(); render(); openLibrarySheet(); }
async function exportLibTune(id){ const r=await libGet(id); if(!r) return;
  const a=document.createElement('a'); a.href=URL.createObjectURL(r.blob); a.download=safeName(r.title)+'.pdf';
  document.body.append(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); }

/* ---------- Baustein 3a: Metadaten-Korrektur der Großsammlung ---------- */
function resetOverride(key){ const t=byKey[key]; if(!t) return; delete OVERRIDES[key]; t.t=t._ot; t.c=t._oc; saveOverrides(); rebuildByKey(); render(); }
function syncViewerTune(key){ if(CURRENT && CURRENT.key===key){ const t=byKey[key]; if(!t) return; CURRENT=t;
  document.getElementById('vTitle').textContent=t.t;
  document.getElementById('vSub').textContent = t.isEdit
      ? ('✏️ '+(t.editor||'')+(t.editedAt?' — '+new Date(t.editedAt).toLocaleString('de-DE'):''))
      : t.isLib ? ((t.c?t.c+' — ':'')+t.b)
      : ((t.c?t.c+' — ':'')+t.b+', S. '+t.pg); } }
function saveNoteMeta(t, patch){ const u=USER.find(x=>x.key===t.key); if(!u) return;
  if('t' in patch) u.t=(patch.t||'').trim()||u.t;
  if('c' in patch) u.c=(patch.c||'').trim();
  saveUser(); render(); }
function openMetaSheet(t){
  if(!t) return;
  const isLib=!!t.isLib, isNote=!!t.isEdit;
  openSheet(card=>{
    card.innerHTML='<h2>Titel &amp; Komponist</h2><div class="muted" style="margin:-6px 0 14px">'
      +(isNote
        ? 'Ändere Titel und Komponist dieser Notiz.'
        : isLib
        ? 'Ändere Titel und Komponist dieses importierten Stücks.'
        : 'Korrigiere die Angaben zu diesem Stück – z. B. einen falschen Komponisten aus der automatischen Ergänzung. '
          +'Die PDF-Datei bleibt unverändert; die Korrektur gilt nur in dieser App und lässt sich zurücksetzen.')+'</div>';
    const wrap=document.createElement('div');
    wrap.innerHTML='<div class="lbl" style="margin:0 0 6px">Titel</div><input class="txt" id="mT" value="'+esc(t.t)+'">'
      +'<div class="lbl" style="margin:12px 0 6px">Komponist</div><input class="txt" id="mC" value="'+esc(t.c||'')+'" placeholder="(leer lassen für keinen Komponisten)">'
      +'<div class="muted" style="margin-top:10px">Buch: '+esc(bookName(t))+((isLib||isNote)?'':' · S. '+esc(t.pg))+((!isLib&&!isNote&&OVERRIDES[t.key])?' · <b>korrigiert</b>':'')+'</div>';
    card.append(wrap);
    const hasOv=!isLib && !isNote && !!OVERRIDES[t.key];
    const row=document.createElement('div'); row.className='row'; row.style.marginTop='16px';
    row.innerHTML='<button class="btn" id="mSave" style="flex:2">Speichern</button>'
      +(hasOv?'<button class="btn ghost" id="mReset" style="flex:1">Zurücksetzen</button>':'')
      +'<button class="btn ghost" id="mCancel" style="flex:1">Abbrechen</button>';
    card.append(row);
    row.querySelector('#mSave').onclick=async()=>{
      const nt=wrap.querySelector('#mT').value, nc=wrap.querySelector('#mC').value;
      if(isNote){ saveNoteMeta(t,{t:nt, c:nc}); }
      else if(isLib){ await saveLibMeta(t.libId,{title:(nt.trim()||'Stück'), composer:nc.trim()}); }
      else { applyOverride(t.key,{t:nt, c:nc}); }
      syncViewerTune(t.key); closeSheet();
    };
    const rb=row.querySelector('#mReset'); if(rb) rb.onclick=()=>{ resetOverride(t.key); syncViewerTune(t.key); closeSheet(); };
    row.querySelector('#mCancel').onclick=closeSheet;
  });
}

/* ---------- Baustein 3b: Sammlungspaket (eigene Noten als eine Datei) ---------- */
async function exportPackage(){
  if(!LIBTUNES.length){ alert('Es sind keine eigenen Noten zum Sichern vorhanden.'); return; }
  const zip=new JSZip(); const tunes=[];
  for(const t of LIBTUNES){ const r=await libGet(t.libId); if(!r||!r.blob) continue;
    const file='pieces/'+r.id+'.pdf'; zip.file(file, r.blob);
    tunes.push({id:r.id,bid:r.bid,title:r.title,composer:r.composer||'',addedAt:r.addedAt||0,np:r.np||1,fileName:r.fileName||'',file}); }
  const manifest={schema:1, app:'realbook', kind:'collection', exportedAt:new Date().toISOString(),
    books:USERBOOKS.map(b=>({bid:b.bid,name:b.name,chip:b.chip,createdAt:b.createdAt})), tunes};
  zip.file('manifest.json', JSON.stringify(manifest,null,1));
  const out=await zip.generateAsync({type:'blob', compression:'STORE'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(out);
  a.download='realbook-sammlung-'+new Date().toISOString().slice(0,10)+'.zip';
  document.body.append(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}
async function importPackage(file){
  let zip; try{ zip=await JSZip.loadAsync(file); }catch(e){ alert('Kein gültiges Paket.'); return; }
  const mf=zip.file('manifest.json'); if(!mf){ alert('Paket ohne Manifest.'); return; }
  let manifest; try{ manifest=JSON.parse(await mf.async('string')); }catch(e){ alert('Manifest nicht lesbar.'); return; }
  if(manifest.kind!=='collection'){ alert('Das ist kein Sammlungspaket.'); return; }
  let addedBooks=0;
  (manifest.books||[]).forEach(b=>{ if(b&&b.bid&&!userBook(b.bid)){ USERBOOKS.push({bid:b.bid,name:b.name||'Import',chip:b.chip||b.name||'Import',createdAt:b.createdAt||Date.now()}); addedBooks++; } });
  let fallbackBid=null;
  const ensureBook=bid=>{ if(bid&&userBook(bid)) return bid; if(!fallbackBid) fallbackBid=createBook('Importierte Noten'); return fallbackBid; };
  saveUserBooks();
  const existing=new Set((await libAll()).map(r=>r.id));
  let added=0, skipped=0;
  for(const m of (manifest.tunes||[])){
    if(!m||!m.id||existing.has(m.id)){ skipped++; continue; }
    const zf=zip.file(m.file); if(!zf){ skipped++; continue; }
    const blob=await zf.async('blob'); const bid=ensureBook(m.bid);
    await libPut({id:m.id,bid,title:m.title||'Stück',composer:m.composer||'',addedAt:m.addedAt||Date.now(),np:m.np||1,fileName:m.fileName||'',blob});
    existing.add(m.id); added++;
  }
  saveUserBooks();
  await loadLibrary(); render(); openLibrarySheet();
  alert('Sammlungspaket eingelesen.\n'+added+' Stück'+(added===1?'':'e')+' importiert'
    +(skipped?', '+skipped+' schon vorhanden':'')+(addedBooks?'\n'+addedBooks+' Buch/Bücher angelegt':''));
}

if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc='vendor/pdfjs/pdf.worker.min.js';

/* ---- fit layout ---- */
function computeFit(n,natW,natH,W,H,gap){
  if(n<=2){ const s=Math.min(H/natH,(W-gap*(n-1))/(n*natW)); return {scale:Math.max(s,0.05),center:true}; }
  return {scale:Math.max(H/natH,0.05),center:false};
}
const _pdfCache={};
async function loadPdf(url){
  if(_pdfCache[url])return _pdfCache[url];
  // Bytes selbst holen und an PDF.js geben – robuster in Safari & mit Service Worker als getDocument(url)
  const buf=await (await fetch(encodeURI(url))).arrayBuffer();
  const doc=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
  _pdfCache[url]=doc; return doc;
}
async function renderPdfFit(t){
  const fit=document.getElementById('vFit'); fit.classList.remove('center');
  fit.innerHTML='<div style="color:#e6eef6;margin:auto">Lädt…</div>';
  try{
    const doc=await loadPdf(t.f); const n=doc.numPages;
    const p1=await doc.getPage(1); const v1=p1.getViewport({scale:1});
    const fsMode=document.getElementById('viewer').classList.contains('fullscreen');
    const box=fit.getBoundingClientRect();
    const W=(fsMode?window.innerWidth:(box.width||window.innerWidth))-24;
    const H=(fsMode?window.innerHeight:(box.height||window.innerHeight))-20;
    const {scale,center}=computeFit(n,v1.width,v1.height,W,H,14);
    fit.classList.toggle('center',center); fit.innerHTML='';
    const dpr=Math.min(window.devicePixelRatio||1,2);
    for(let i=1;i<=n;i++){ const page=await doc.getPage(i); const vp=page.getViewport({scale:scale*dpr});
      const cvs=document.createElement('canvas'); cvs.className='pg';
      cvs.width=Math.round(vp.width); cvs.height=Math.round(vp.height);
      cvs.style.width=(vp.width/dpr)+'px'; cvs.style.height=(vp.height/dpr)+'px';
      fit.append(cvs); await page.render({canvasContext:cvs.getContext('2d'),viewport:vp}).promise; }
  }catch(e){
    /* Fallback: PDF.js nicht verfügbar → native Anzeige, aber per Iframe-Breite auf die HÖHE eingepasst.
       Iframe-Breite = Seitenbreite bei voller Höhe → der native Betrachter (view=FitH) füllt die Höhe. */
    const frame=document.getElementById('vFrame'), holder=frame.parentElement;
    fit.style.display='none'; fit.innerHTML='';

/* ---- IndexedDB: annotated page images ('pages') + eigene importierte PDFs ('libtunes') ---- */
const IDB_DB='realbook', IDB_ST='pages', IDB_LIB='libtunes';
function idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open(IDB_DB,3);
  r.onupgradeneeded=()=>{ const db=r.result;
    if(!db.objectStoreNames.contains(IDB_ST)) db.createObjectStore(IDB_ST,{keyPath:'id'});
    if(!db.objectStoreNames.contains(IDB_LIB)) db.createObjectStore(IDB_LIB,{keyPath:'id'});
    if(!db.objectStoreNames.contains('parts')){ const ps=db.createObjectStore('parts',{keyPath:'id'}); try{ ps.createIndex('tuneKey','tuneKey',{unique:false}); }catch(e){} } };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
/* Bibliothek: ein Datensatz je Stück = {id,bid,title,composer,addedAt,np,fileName,blob} */
async function libAll(){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction(IDB_LIB,'readonly'),st=tx.objectStore(IDB_LIB),out=[],c=st.openCursor();
  c.onsuccess=e=>{ const cur=e.target.result; if(cur){ out.push(cur.value); cur.continue(); } else res(out); }; c.onerror=()=>rej(c.error); }); }
async function libGet(id){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction(IDB_LIB,'readonly'),g=tx.objectStore(IDB_LIB).get(id); g.onsuccess=()=>res(g.result); g.onerror=()=>rej(g.error); }); }
async function libPut(rec){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction(IDB_LIB,'readwrite'); tx.objectStore(IDB_LIB).put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function libDelete(id){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction(IDB_LIB,'readwrite'); tx.objectStore(IDB_LIB).delete(id); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function idbPutPages(uk,arr){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction(IDB_ST,'readwrite'),st=tx.objectStore(IDB_ST);
  arr.forEach((d,i)=>st.put({id:uk+'#'+i,userKey:uk,page:i,data:d})); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function idbGetPages(uk){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction(IDB_ST,'readonly'),st=tx.objectStore(IDB_ST),out=[],c=st.openCursor();
  c.onsuccess=e=>{ const cur=e.target.result; if(cur){ if(cur.value.userKey===uk)out.push(cur.value); cur.continue(); } else { out.sort((a,b)=>a.page-b.page); res(out.map(x=>x.data)); } }; c.onerror=()=>rej(c.error); }); }
async function idbDeletePages(uk){ const db=await idb(); return new Promise(res=>{ const tx=db.transaction(IDB_ST,'readwrite'),st=tx.objectStore(IDB_ST),c=st.openCursor();
  c.onsuccess=e=>{ const cur=e.target.result; if(cur){ if(cur.value.userKey===uk)cur.delete(); cur.continue(); } else res(); }; }); }

function showEditorPage(i){

  const lbl=document.getElementById('ePageLbl'); if(lbl)lbl.textContent=(i+1)+' / '+ED.pages.length;

function rebuildBase(){ if(!ED.base)return; const b=ED.base,ctx=b.getContext('2d'); ctx.clearRect(0,0,b.width,b.height); ED.pages[ED.cur].strokes.forEach(s=>drawStroke(ctx,s)); }
function drawCurrent(){ const c=ED.drawC,ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); if(ED.base)ctx.drawImage(ED.base,0,0); if(ED.stroke)drawStroke(ctx,ED.stroke); }
function redrawStrokes(){ rebuildBase(); drawCurrent(); }
function drawStroke(ctx,s){
  if(s.hl){ ctx.save(); ctx.globalAlpha=0.30; ctx.globalCompositeOperation='multiply'; ctx.strokeStyle=s.color; ctx.fillStyle=s.color; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=s.w;
    if(s.pts.length===1){ ctx.beginPath(); ctx.arc(s.pts[0].x,s.pts[0].y,s.w/2,0,7); ctx.fill(); }
    else { ctx.beginPath(); ctx.moveTo(s.pts[0].x,s.pts[0].y); for(let i=1;i<s.pts.length;i++) ctx.lineTo(s.pts[i].x,s.pts[i].y); ctx.stroke(); }
    ctx.restore(); return; }
  ctx.globalCompositeOperation=s.erase?'destination-out':'source-over';
  ctx.strokeStyle=s.color; ctx.fillStyle=s.color; ctx.lineCap='round'; ctx.lineJoin='round';
  if(s.pts.length===1){ const p=s.pts[0]; ctx.beginPath(); ctx.arc(p.x,p.y,s.w/2,0,7); ctx.fill(); ctx.globalCompositeOperation='source-over'; return; }
  for(let i=1;i<s.pts.length;i++){ const a=s.pts[i-1],b=s.pts[i];
    ctx.lineWidth=s.erase? s.w : s.w*(0.5+1.3*(b.p||0.5));
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  ctx.globalCompositeOperation='source-over';
}
function bindDraw(c){
  // Ein einziges, kapselungsfreies Eingabemodell: KEIN setPointerCapture (das war die
  // Ursache dafür, dass beim erneuten Ansetzen des Stifts jeder zweite Strich verschluckt
  // wurde). Zeichnen + Zwei-Finger-Zoom laufen komplett über Pointer-Events.
  let rect=null; const sx=()=>c.width/rect.width, sy=()=>c.height/rect.height;
  const pt=e=>({ x:(e.clientX-rect.left)*sx(), y:(e.clientY-rect.top)*sy(), p:(e.pressure&&e.pressure>0)?e.pressure:0.5 });
  function seg(ctx,a,b,s){ ctx.globalCompositeOperation=s.erase?'destination-out':'source-over';
    ctx.strokeStyle=s.color; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.lineWidth=s.erase? s.w : s.w*(0.5+1.3*(b.p||0.5));
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.globalCompositeOperation='source-over'; }
  const touches=new Map(); let gz=null;
  const arr=()=>[...touches.values()];
  const gdist=()=>{ const a=arr(); return Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y)||1; };
  const gmid=()=>{ const a=arr(); return {x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2}; };
  function cancelStroke(){ ED.drawing=false; ED.activeId=null; ED.stroke=null; drawCurrent(); }
  // Laufenden Strich sofort festschreiben. WICHTIG gegen den "jeder zweite / kurze Striche
  // fehlen"-Effekt: auf iPad-Safari kann das pointerup eines kurzen Strichs verspätet oder
  // nach dem pointerdown des nächsten eintreffen. Wir warten deshalb NIE auf das pointerup –
  // ein neuer Aufsetzpunkt schreibt den vorigen Strich einfach sofort fest.
  function finalizeStroke(){
    if(ED.stroke){ if(ED.base) drawStroke(ED.base.getContext('2d'),ED.stroke); ED.pages[ED.cur].strokes.push(ED.stroke); ED.stroke=null; }
    ED.drawing=false; ED.activeId=null; ED.strokeStart=0;
  }

  c.addEventListener('pointerdown',e=>{
    if(e.pointerType==='pen')ED.penSeen=true;
    diag('DOWN',e);
    if(e.pointerType==='touch'){
      touches.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(touches.size>=2){ gz={d:gdist(),z:ED.zoom,m:gmid(),px:ED.panX,py:ED.panY}; if(ED.drawing)cancelStroke(); return; }
      if(ED.penSeen)return;                 // Handballen/Finger zeichnen nie, sobald ein Stift benutzt wurde
    }
    if(ED.drawing)finalizeStroke();          // hängengebliebenen Vorstrich sofort sichern, dann neu beginnen
    e.preventDefault();
    rect=c.getBoundingClientRect();
    ED.strokeStart=e.timeStamp;              // Zeitmarke dieses Strichs – gegen verspätete Events vorheriger Striche
    const isHL=ED.tool==='hl', isEr=ED.tool==='erase';
    const bw= isEr?ERASE_WIDTHS[ED.sizeIdx] : isHL?HL_WIDTHS[ED.sizeIdx] : PEN_WIDTHS[ED.sizeIdx];
    const w=bw*sx();
    ED.stroke={color:ED.color,w,erase:isEr,hl:isHL,pts:[pt(e)]};
    ED.drawing=true; ED.activeId=e.pointerId; ED.dctx=c.getContext('2d');
    if(isHL){ drawCurrent(); }
    else { const ctx=ED.dctx, p0=ED.stroke.pts[0]; ctx.globalCompositeOperation=isEr?'destination-out':'source-over';
      ctx.fillStyle=ED.stroke.color; ctx.beginPath(); ctx.arc(p0.x,p0.y,w/2,0,7); ctx.fill(); ctx.globalCompositeOperation='source-over'; }
  });
  c.addEventListener('pointermove',e=>{
    if(e.pointerType==='touch'&&touches.has(e.pointerId)){
      touches.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(gz&&touches.size===2){ e.preventDefault(); const nd=gdist(), m=gmid();
        ED.zoom=Math.min(4,Math.max(1, gz.z*nd/gz.d)); ED.panX=gz.px+(m.x-gz.m.x); ED.panY=gz.py+(m.y-gz.m.y); applyZoom(); return; }
    }
    if(!ED.drawing||!ED.stroke||e.pointerId!==ED.activeId)return;
    if(e.timeStamp<ED.strokeStart)return;    // verspäteter Move eines früheren Strichs → ignorieren
    e.preventDefault();
    const evs=(e.getCoalescedEvents&&e.getCoalescedEvents().length)?e.getCoalescedEvents():[e];
    if(ED.stroke.hl){ for(const ev of evs) ED.stroke.pts.push(pt(ev)); drawCurrent(); }
    else { const ctx=ED.dctx, P=ED.stroke.pts; for(const ev of evs){ const np=pt(ev); seg(ctx,P[P.length-1],np,ED.stroke); P.push(np); } }
  });
  const end=e=>{
    if(e.pointerType==='touch'){ touches.delete(e.pointerId);
      if(touches.size<2){ gz=null; if(ED.zoom<=1.02){ ED.zoom=1;ED.panX=0;ED.panY=0;applyZoom(); } } }
    // KERN-FIX: Apple Pencil verwendet für jeden Strich dieselbe pointerId. Ein verspätetes
    // pointerup des VORIGEN Strichs würde sonst den laufenden neuen Strich vorzeitig beenden
    // ("jeder zweite kurze Strich fehlt"). Zeitmarke entlarvt das veraltete Event.
    const stale = ED.drawing && e.pointerId===ED.activeId && e.timeStamp<ED.strokeStart;
    diag((e.type==='pointercancel'?'CANCEL':'UP')+(stale?'·alt':''),e);
    if(!ED.drawing||e.pointerId!==ED.activeId)return;
    if(e.timeStamp<ED.strokeStart)return;    // veraltetes Ende eines vorherigen Strichs → NICHT beenden
    finalizeStroke();
  };
  c.addEventListener('pointerup',end); c.addEventListener('pointercancel',end);
}

/* iOS-Textauswahl/Callout ("Kopieren/Auswählen") unterdrücken – sie kapert sonst die

(function(){ const ed=document.getElementById('editor'); if(!ed)return;

  ['selectstart','contextmenu','gesturestart','gesturechange'].forEach(n=>ed.addEventListener(n,stop,{passive:false}));
  /* DER eigentliche Hammer: die Auswahl-/Callout-Geste entsteht aus dem Touch-Strom.
     Nur auf der ZEICHENFLÄCHE (nicht auf den Knöpfen!) die Touch-Standardaktion

     Ereignisse fürs Zeichnen und den Zwei-Finger-Zoom laufen davon unbeeinflusst weiter. */

})();
