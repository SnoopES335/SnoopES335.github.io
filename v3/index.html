  const APP_KEY = 'fsn69fl4zqqc4ti';
  const REDIRECT = location.origin + location.pathname.replace(/index\.html$/,'');
  const AUTH = 'https://www.dropbox.com/oauth2/authorize';
  const TOKEN = 'https://api.dropboxapi.com/oauth2/token';
  const UP = 'https://content.dropboxapi.com/2/files/upload';
  const DL = 'https://content.dropboxapi.com/2/files/download';

  const K = { ref:'rb_dbx_refresh', acc:'rb_dbx_access', exp:'rb_dbx_exp', ver:'rb_dbx_verifier',
    meta:'rb_sync_meta', snap:'rb_sync_snap', backup:'rb_sync_backup', auto:'rb_sync_auto',
    last:'rb_sync_last', dev:'rb_sync_device' };

  const lsGet = k => { try { return localStorage.getItem(k); } catch(e){ return null; } };
  const lsSet = (k,v) => { try { localStorage.setItem(k,v); } catch(e){} };
  const lsDel = k => { try { localStorage.removeItem(k); } catch(e){} };
  const jget = (k,d) => { try { return JSON.parse(lsGet(k)) ?? d; } catch(e){ return d; } };
  const jset = (k,v) => lsSet(k, JSON.stringify(v));

  let META = jget(K.meta, {});
  let SNAP = jget(K.snap, {});
  let deviceId = lsGet(K.dev); if(!deviceId){ deviceId = 'd_'+Math.random().toString(36).slice(2,9); lsSet(K.dev, deviceId); }
  let statusText = '';
  let _busy = false, _pending = false, _debounce = null, _lastAuto = 0;

  const now = () => Date.now();
  const stamp = t => { try { return new Date(t).toLocaleString('de-DE'); } catch(e){ return '?'; } };

  /* ---------- Kategorien: read() -> {id:wert}, write(map) zurück in den App-State ---------- */
  const CATS = {
    setlists: { file:'setlists',
      read: () => Object.fromEntries((S.sets||[]).map(s=>[s.id, s])),
      write: m => { S.sets = Object.values(m); }, persist: () => save() },
    tags: { file:'tags',
      read: () => Object.fromEntries((S.tags||[]).map(t=>[t.id, t])),
      write: m => { S.tags = Object.values(m); }, persist: () => save() },
    tunetags: { file:'tunetags',
      read: () => { const o={}; for(const k in S.tuneTags){ if((S.tuneTags[k]||[]).length) o[k]=S.tuneTags[k]; } return o; },
      write: m => { const o={}; for(const k in m){ if((m[k]||[]).length) o[k]=m[k]; } S.tuneTags = o; }, persist: () => save() },
    favorites: { file:'favorites',
      read: () => { const o={}; S.fav.forEach(k=>o[k]=1); return o; },
      write: m => { S.fav = new Set(Object.keys(m)); }, persist: () => save() },
    practice: { file:'practice',
      read: () => { const o={}; S.prac.forEach(k=>o[k]=1); return o; },
      write: m => { S.prac = new Set(Object.keys(m)); }, persist: () => save() },
    overrides: { file:'overrides',
      read: () => { const o={}; for(const k in OVERRIDES) o[k]=OVERRIDES[k]; return o; },
      write: m => { for(const k in OVERRIDES) delete OVERRIDES[k]; for(const k in m) OVERRIDES[k]=m[k]; },
      persist: () => { saveOverrides(); reapplyOverrides(); } }
  };
  const CAT_KEYS = Object.keys(CATS);

  /* Overrides nach einem Sync erneut auf die Großsammlung anwenden (Titel/Komponist live). */
  function reapplyOverrides(){
    try {
      TUNES.forEach(t => { const o=OVERRIDES[t.key];
        t.t = (o && typeof o.t==='string' && o.t) ? o.t : t._ot;
        t.c = (o && typeof o.c==='string') ? o.c : (t._oc||''); });
      rebuildByKey();
    } catch(e){}
  }

  /* ---------- lokale Sicherung (Ring, letzte 20) ---------- */
  function backup(cat, dataMap){
    try {
      const ring = jget(K.backup, []);
      ring.push({ t: now(), cat, data: dataMap });
      while(ring.length > 20) ring.shift();
      jset(K.backup, ring);
    } catch(e){}
  }

  /* ---------- PKCE / OAuth ---------- */
  function b64url(buf){ const b=new Uint8Array(buf); let s=''; for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]);
    return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
  function randVerifier(){ const a=new Uint8Array(64); crypto.getRandomValues(a); return b64url(a); }
  function challenge(v){ return crypto.subtle.digest('SHA-256', new TextEncoder().encode(v)).then(b64url); }
  function form(o){ return Object.keys(o).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(o[k])).join('&'); }

  function startLogin(){
    const v = randVerifier(); lsSet(K.ver, v);
    setStatus('Leite zu Dropbox weiter…');
    challenge(v).then(ch => {
      location.href = AUTH + '?client_id='+encodeURIComponent(APP_KEY)
        + '&response_type=code&code_challenge='+encodeURIComponent(ch)
        + '&code_challenge_method=S256&token_access_type=offline'
        + '&redirect_uri='+encodeURIComponent(REDIRECT);
    }).catch(e => setStatus('Fehler beim Anmelden: '+e));
  }

  function exchangeCode(code){
    const v = lsGet(K.ver);
    return fetch(TOKEN, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: form({ code, grant_type:'authorization_code', client_id:APP_KEY, redirect_uri:REDIRECT, code_verifier:v||'' }) })
      .then(r => r.json().then(j => ({ok:r.ok, j}))).then(res => {
        if(!res.ok) throw new Error('Anmeldung fehlgeschlagen: '+JSON.stringify(res.j));
        const j = res.j;
        if(j.refresh_token) lsSet(K.ref, j.refresh_token);
        if(j.access_token){ lsSet(K.acc, j.access_token); lsSet(K.exp, String(now()+(j.expires_in||14400)*1000)); }
        lsDel(K.ver);
      });
  }

  function refreshAccess(){
    const rt = lsGet(K.ref);
    if(!rt) return Promise.reject(new Error('nicht verbunden'));
    return fetch(TOKEN, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: form({ grant_type:'refresh_token', refresh_token:rt, client_id:APP_KEY }) })
      .then(r => r.json().then(j => ({ok:r.ok, j}))).then(res => {
        if(!res.ok){
          if(res.j && res.j.error==='invalid_grant'){ lsDel(K.ref); lsDel(K.acc); lsDel(K.exp); }
          throw new Error('Anmeldung abgelaufen — bitte neu verbinden.');
        }
        lsSet(K.acc, res.j.access_token); lsSet(K.exp, String(now()+(res.j.expires_in||14400)*1000));
        return res.j.access_token;
      });
  }

  function token(){
    const at = lsGet(K.acc), exp = parseInt(lsGet(K.exp)||'0',10);
    if(at && exp && now() < exp-60000) return Promise.resolve(at);
    return refreshAccess();
  }

  function isConnected(){ return !!lsGet(K.ref); }
  function autoOn(){ return lsGet(K.auto) !== '0'; }

  /* ---------- Dropbox Datei-Zugriff (relativ zum App-Ordner) ---------- */
  function download(file){
    return token().then(at => fetch(DL, { method:'POST', headers:{
        'Authorization':'Bearer '+at, 'Dropbox-API-Arg': JSON.stringify({ path:'/state/'+file+'.json' }) } }))
      .then(r => r.text().then(tx => ({ok:r.ok, tx})))
      .then(res => {
        if(res.ok){ try { return JSON.parse(res.tx); } catch(e){ return null; } }
        if(res.tx && res.tx.indexOf('not_found') >= 0) return null;   // Datei existiert noch nicht
        throw new Error('Laden ('+file+'): '+res.tx.slice(0,160));
      });
  }
  function upload(file, obj){
    const body = JSON.stringify(obj);
    return token().then(at => fetch(UP, { method:'POST', headers:{
        'Authorization':'Bearer '+at,
        'Dropbox-API-Arg': JSON.stringify({ path:'/state/'+file+'.json', mode:'overwrite', mute:true }),
        'Content-Type':'application/octet-stream' }, body }))
      .then(r => { if(!r.ok) return r.text().then(t => { throw new Error('Hochladen ('+file+'): '+t.slice(0,160)); }); });
  }

  /* ---------- Merge einer Kategorie ---------- */
  function syncCat(cat){
    const cfg = CATS[cat];
    const local = cfg.read();
    const meta = META[cat] || (META[cat] = {});
    const snap = SNAP[cat] || (SNAP[cat] = {});
    const t = now();

    // 1. lokale Änderungen seit letztem Sync erkennen (per Snapshot-Diff)
    const localIds = Object.keys(local);
    const localSet = new Set(localIds);
    localIds.forEach(id => {
      const ser = JSON.stringify(local[id]);
      if(snap[id] !== ser){
        const nu = (local[id] && typeof local[id].updatedAt==='number') ? local[id].updatedAt : null;
        meta[id] = { u: nu!=null ? Math.max(nu, (meta[id]&&meta[id].u)||0) : t, d:false };
      } else if(meta[id] && meta[id].d){ meta[id] = { u:t, d:false }; }
      if(!meta[id]) meta[id] = { u:t, d:false };
    });
    Object.keys(snap).forEach(id => {
      if(!localSet.has(id) && !(meta[id] && meta[id].d)) meta[id] = { u:t, d:true }; // lokal gelöscht -> Tombstone
    });

    // 2. Remote holen und mergen
    return download(cfg.file).then(remote => {
      const rItems = (remote && remote.items) || {};
      const rMeta  = (remote && remote.meta)  || {};
      const ids = new Set([].concat(Object.keys(meta), Object.keys(rMeta), Object.keys(local), Object.keys(rItems)));
      const outItems = {}, outMeta = {};
      ids.forEach(id => {
        const lm = meta[id] || (local[id]!==undefined ? {u:0,d:false} : null);
        const rm = rMeta[id] || (rItems[id]!==undefined ? {u:0,d:false} : null);
        let side;
        if(lm && rm) side = (rm.u||0) > (lm.u||0) ? 'r' : 'l';   // Gleichstand -> lokal
        else side = lm ? 'l' : 'r';
        const wm = side==='l' ? lm : rm;
        outMeta[id] = { u: wm.u||0, d: !!wm.d };
        if(!wm.d){
          let v = side==='l' ? local[id] : rItems[id];
          if(v===undefined) v = side==='l' ? rItems[id] : local[id];
          if(v!==undefined) outItems[id] = v; else outMeta[id].d = true;
        }
      });
      // Tombstones > 90 Tage aufräumen
      const cutoff = t - 90*24*3600*1000;
      Object.keys(outMeta).forEach(id => { if(outMeta[id].d && (outMeta[id].u||0) < cutoff) delete outMeta[id]; });

      // 3. Ergebnis übernehmen (mit Sicherung), Snapshot/Meta aktualisieren
      const localSer = JSON.stringify(local);
      const mergedSer = JSON.stringify(outItems);
      const changedLocally = localSer !== mergedSer;
      _busy = true;
      try {
        if(changedLocally){ backup(cat, local); cfg.write(outItems); cfg.persist(); }
      } finally { _busy = false; }
      const newSnap = {}; Object.keys(outItems).forEach(id => newSnap[id] = JSON.stringify(outItems[id]));
      SNAP[cat] = newSnap; META[cat] = outMeta;

      // 4. hochladen, falls Remote abweicht
      const needUp = JSON.stringify({items:rItems, meta:rMeta}) !== JSON.stringify({items:outItems, meta:outMeta});
      return (needUp ? upload(cfg.file, { schema:1, kind:cat, updatedAt:t, device:deviceId, items:outItems, meta:outMeta }) : Promise.resolve())
        .then(() => ({ cat, changedLocally, needUp }));
    });
  }

  /* ---------- Kompletter Abgleich ---------- */
  function syncAll(manual){
    if(_syncRunning){ _pending = true; return _syncRunning; }
    if(!isConnected()) return Promise.resolve();
    setStatus('Gleiche ab…');
    let anyLocal = false;
    const run = CAT_KEYS.reduce((p, cat) => p.then(() => syncCat(cat).then(r => { if(r && r.changedLocally) anyLocal = true; })
        .catch(e => { setStatus('⚠ '+ (e && e.message ? e.message : e)); throw e; })), Promise.resolve());
    _syncRunning = run.then(() => {
      jset(K.meta, META); jset(K.snap, SNAP); lsSet(K.last, String(now()));
      if(anyLocal){ try { render(); } catch(e){} }
      setStatus('Abgeglichen · '+stamp(now()));
    }).catch(() => {}).then(() => {
      _syncRunning = null;
      if(_pending){ _pending = false; return syncAll(); }
    });
    return _syncRunning;
  }
  let _syncRunning = null;

  /* ---------- Auto-Trigger nach lokaler Änderung (entprellt) ---------- */
  function onLocalChange(){
    if(!isConnected() || !autoOn()) return;
    clearTimeout(_debounce);
    _debounce = setTimeout(() => syncAll(), 3000);
  }

  /* save()/saveOverrides() umschließen → automatischer Abgleich nach jeder Änderung */
  function wrap(name){
    const orig = window[name];
    if(typeof orig !== 'function') return;
    window[name] = function(){ const r = orig.apply(this, arguments); if(!_busy) onLocalChange(); return r; };
  }

  /* ---------- Status/UI ---------- */
  function setStatus(s){ statusText = s; const el = document.getElementById('rbSyncStatus'); if(el) el.textContent = s; }

  function renderSettings(card){
    if(!card || document.getElementById('rbSyncBox')) return;
    const box = document.createElement('div');
    box.id = 'rbSyncBox';
    box.style.cssText = 'border-top:1px solid var(--line);padding-top:14px;margin-top:14px';
    const last = lsGet(K.last);
    if(!isConnected()){
      box.innerHTML = '<div class="lbl" style="margin:0 0 8px">☁︎ Cloud-Abgleich (Dropbox)</div>'
        + '<div class="muted" style="margin:0 0 10px">Gleicht Setlists, Tags, Favoriten, Üben-Liste und Metadaten-Korrekturen automatisch zwischen deinen Geräten ab. Noten-PDFs bleiben lokal.</div>'
        + '<button class="btn" id="rbSyncConnect" style="width:100%">Mit Dropbox verbinden</button>'
        + '<div class="muted" id="rbSyncStatus" style="margin:8px 2px 0">'+esc(statusText)+'</div>';
      card.append(box);
      const b = document.getElementById('rbSyncConnect'); if(b) b.onclick = startLogin;
    } else {
      box.innerHTML = '<div class="lbl" style="margin:0 0 8px">☁︎ Cloud-Abgleich (Dropbox)</div>'
        + '<div class="muted" style="margin:0 0 10px">Verbunden.'+(last?' Letzter Abgleich: '+esc(stamp(parseInt(last,10))):' Noch nicht abgeglichen.')+'</div>'
        + '<div class="row" style="gap:8px;flex-wrap:wrap"><button class="btn" id="rbSyncNow" style="flex:1">↻ Jetzt abgleichen</button>'
        + '<button class="btn ghost" id="rbSyncOff" style="flex:1">Verbindung trennen</button></div>'
        + '<label style="display:flex;align-items:center;gap:8px;margin:10px 2px 0;font-size:14px;cursor:pointer">'
        + '<input type="checkbox" id="rbSyncAuto"'+(autoOn()?' checked':'')+'> Automatisch abgleichen</label>'
        + '<div class="muted" id="rbSyncStatus" style="margin:8px 2px 0">'+esc(statusText)+'</div>';
      card.append(box);
      const now_ = document.getElementById('rbSyncNow'); if(now_) now_.onclick = () => syncAll(true);
      const off = document.getElementById('rbSyncOff'); if(off) off.onclick = () => {
        if(confirm('Verbindung zu Dropbox trennen? Deine Daten bleiben lokal erhalten.')){
          [K.ref,K.acc,K.exp,K.ver].forEach(lsDel); renderReplace(card); } };
      const au = document.getElementById('rbSyncAuto'); if(au) au.onchange = () => { lsSet(K.auto, au.checked?'1':'0'); if(au.checked) syncAll(); };
    }
  }
  function renderReplace(card){ const old=document.getElementById('rbSyncBox'); if(old) old.remove(); renderSettings(card); }

  /* ---------- Init / Redirect-Rücksprung ---------- */
  function boot(){
    wrap('save'); wrap('saveOverrides');
    // openDataSheet umschließen → Abgleich-Bereich im ⚙︎-Menü anhängen
    if(typeof window.openDataSheet === 'function'){
      const od = window.openDataSheet;
      window.openDataSheet = function(){ const r = od.apply(this, arguments); try { renderSettings(document.getElementById('sheetCard')); } catch(e){} return r; };
      // ⚙︎-Knopf hält eine direkte Referenz auf die Originalfunktion → neu auf die umschlossene zeigen
      const sb = document.getElementById('settingsBtn'); if(sb) sb.onclick = window.openDataSheet;
    }
    // Foreground → leiser Abgleich (max. alle 15 s)
    document.addEventListener('visibilitychange', () => { if(!document.hidden) maybeAuto(); });
    window.addEventListener('focus', maybeAuto);

    const q = location.search;
    if(q.indexOf('code=') >= 0){
      const code = new URLSearchParams(q).get('code');
      history.replaceState({}, '', REDIRECT);
      setStatus('Verbinde…');
      exchangeCode(code).then(() => { setStatus('Verbunden.'); return syncAll(); })
        .catch(e => setStatus('⚠ '+(e && e.message ? e.message : e)));
    } else if(q.indexOf('error=') >= 0){
      const err = new URLSearchParams(q).get('error_description') || new URLSearchParams(q).get('error');
      history.replaceState({}, '', REDIRECT);
      setStatus('⚠ Dropbox: '+err+' (ist die Adresse '+REDIRECT+' als Redirect-URI eingetragen?)');
    } else if(isConnected() && autoOn()){
      syncAll();
    }
  }
  function maybeAuto(){ if(isConnected() && autoOn() && now()-_lastAuto > 15000){ _lastAuto = now(); syncAll(); } }

  window.RBSync = { renderSettings, syncAll, isConnected, startLogin, _boot:boot };
  if(document.readyState === 'loading') window.addEventListener('DOMContentLoaded', boot); else setTimeout(boot, 0);
})();


/* ============================================================================
   Phase 2 — Baustein „Stimmen & Audio": ein Stück = Bündel aus Dateien mit Rollen.
   Isoliert: neuer IndexedDB-Store 'parts', eigenes Betrachter-Overlay + Audio-Leiste.
   Gilt für ALLE Stücke (Großsammlung + eigene Importe), Schlüssel = t.key.
   Rührt den bestehenden Betrachter/CSS nicht an (nur additive Hooks: voiceBadges,
   umschlossenes openViewer/openMetaSheet). Dateien bleiben gerätelokal (kein Auto-Abgleich).
   ========================================================================== */
(function(){
  "use strict";
  const ROLE_KEY='rb_roles';
  const DEF_ROLES=['Leadsheet','Piano','Bass','Gitarre','Alt-Sax','Tenor-Sax','Trompete','Posaune','Audio'];
  const AUDIO_RX=/\.(mp3|m4a|aac|wav|ogg|opus)$/i;
  const SHORT={ 'Leadsheet':'LS','Piano':'Pno','Bass':'Bass','Gitarre':'Git','Alt-Sax':'ASax',
    'Tenor-Sax':'TSax','Trompete':'Tpt','Posaune':'Pos','Audio':'♪','Gesang':'Voc','Vocals':'Voc','Schlagzeug':'Dr' };
  const shortOf = r => SHORT[r] || (r||'').slice(0,4);
  const uid = () => 'p_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const roles = () => { try{ const r=JSON.parse(localStorage.getItem(ROLE_KEY)); if(Array.isArray(r)&&r.length) return r; }catch(e){} return DEF_ROLES.slice(); };

  /* ---- IndexedDB 'parts' (Store wird in idb() v3 angelegt) ---- */
  function tx(mode){ return idb().then(db=>{ try{ return db.transaction('parts',mode).objectStore('parts'); }catch(e){ return null; } }); }
  function partsAll(){ return idb().then(db=>new Promise((res,rej)=>{
    let t; try{ t=db.transaction('parts','readonly'); }catch(e){ return res([]); }
    const st=t.objectStore('parts'), out=[], c=st.openCursor();
    c.onsuccess=e=>{ const cur=e.target.result; if(cur){ out.push(cur.value); cur.continue(); } else res(out); }; c.onerror=()=>rej(c.error); })); }
  function partPut(rec){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('parts','readwrite'); t.objectStore('parts').put(rec); t.oncomplete=()=>res(); t.onerror=()=>rej(t.error); })); }
  function partDel(id){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('parts','readwrite'); t.objectStore('parts').delete(id); t.oncomplete=()=>res(); t.onerror=()=>rej(t.error); })); }

  let PARTS={}; window.PARTS=PARTS;
  function loadParts(){ return partsAll().then(list=>{
    Object.values(PARTS).forEach(arr=>arr.forEach(p=>{ if(p._url) try{ URL.revokeObjectURL(p._url); }catch(_){}}));
    const map={};
    list.forEach(p=>{ try{ p._url=URL.createObjectURL(p.blob); }catch(_){ p._url=''; } (map[p.tuneKey]=map[p.tuneKey]||[]).push(p); });
    Object.values(map).forEach(arr=>arr.sort((a,b)=>(a.addedAt||0)-(b.addedAt||0)));
    PARTS=map; window.PARTS=map;
  }).catch(()=>{}); }
  const partsOf = key => PARTS[key]||[];

  /* ---- Badges in der Listenzeile (Hook aus tuneRow) ---- */
  window.voiceBadges=function(t){
    const ps = t && t.key ? partsOf(t.key) : [];
    if(!ps.length) return '';
    return '<span class="vbadges">'+ps.map(p=>'<span class="vbadge'+(p.kind==='audio'?' aud':'')+'">'+esc(shortOf(p.role))+'</span>').join('')+'</span>';
  };

  /* ---- CSS additiv einspielen ---- */
  function injectCSS(){
    if(document.getElementById('partsCSS')) return;
    const s=document.createElement('style'); s.id='partsCSS';
    s.textContent=`
    .vbadges{display:inline-flex;gap:4px;margin-left:2px;vertical-align:middle}
    .vbadge{font-size:11px;font-weight:700;padding:1px 5px;border-radius:6px;background:#26313c;color:#9fd0ff;border:1px solid #37485a}
    .vbadge.aud{color:#ffd27a;border-color:#5a4a2a;background:#33291a}
    #voiceBar{display:flex;gap:6px;align-items:center;padding:8px 12px;background:#0d1319;border-bottom:1px solid var(--line);overflow-x:auto}
    #voiceBar .vlbl{color:var(--sub);font-size:12px;margin-right:2px;flex:0 0 auto}
    #voiceBar .vc{flex:0 0 auto;font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;background:#1b2129;color:#cdd6df;border:1px solid #2b333d;cursor:pointer;white-space:nowrap}
    #voiceBar .vc.on{background:#0a5cff;color:#fff;border-color:#0a5cff}
    #voiceBar .vc.aud.on{background:#c58a2a;border-color:#c58a2a}
    #voiceOverlay{position:fixed;inset:0;z-index:130;background:#0b0f13;display:none;flex-direction:column}
    #voiceOverlay.open{display:flex}
    #voiceOverlay .vohead{display:flex;align-items:center;gap:10px;padding:10px 14px;color:#eef2f6;background:#111922;border-bottom:1px solid #22303a}
    #voiceOverlay .vohead b{font-size:16px}
    #voiceOverlay .vobody{flex:1;overflow:auto;text-align:center;padding:10px;background:#0b0f13}
    #voiceOverlay canvas{max-width:100%;display:block;margin:0 auto 10px;background:#fff;border-radius:4px;box-shadow:0 2px 10px rgba(0,0,0,.5)}
    #voiceAudio{position:fixed;left:0;right:0;bottom:0;z-index:125;background:#141b22;border-top:1px solid #2b333d;padding:8px 12px 12px;display:none;align-items:center;gap:10px}
    #voiceAudio.open{display:flex}
    #voiceAudio .vaname{color:#ffd27a;font-size:13px;font-weight:600;flex:0 0 auto;max-width:30%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .partsSec .prow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .partsSec .prole{font-weight:600;flex:0 0 auto}
    .partsSec .pfile{color:var(--sub);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .partsSec .pdel{color:#ff6b6b;cursor:pointer;padding:2px 6px}
    .partsSec select,.partsSec .btn{font-size:14px}`;
    document.head.appendChild(s);
  }

  /* ---- Betrachter-Overlay (PDF-Stimme) ---- */
  function ensureOverlay(){
    let ov=document.getElementById('voiceOverlay');
    if(ov) return ov;
    ov=document.createElement('div'); ov.id='voiceOverlay';
    ov.innerHTML='<div class="vohead"><button class="btn ghost" id="voClose">‹ Zurück</button><b id="voTitle"></b></div><div class="vobody" id="voBody"></div>';
    document.body.appendChild(ov);
    ov.querySelector('#voClose').onclick=closeOverlay;
    return ov;
  }
  function closeOverlay(){ const ov=document.getElementById('voiceOverlay'); if(ov){ ov.classList.remove('open'); ov.querySelector('#voBody').innerHTML=''; } setActiveChip(null); }
  async function showPdf(part){
    injectCSS(); const ov=ensureOverlay(); ov.querySelector('#voTitle').textContent=part.role+(part.fileName?' · '+part.fileName:'');
    const body=ov.querySelector('#voBody'); body.innerHTML='<div style="color:#e6eef6;margin-top:40px">Lädt…</div>';
    ov.classList.add('open');
    try{
      const doc=await loadPdf(part._url); const n=doc.numPages;
      body.innerHTML='';
      const W=Math.min(window.innerWidth,1100)-24; const dpr=Math.min(window.devicePixelRatio||1,2);
      for(let i=1;i<=n;i++){ const page=await doc.getPage(i); const v1=page.getViewport({scale:1});
        const scale=W/v1.width; const vp=page.getViewport({scale:scale*dpr});
        const cvs=document.createElement('canvas'); cvs.width=Math.round(vp.width); cvs.height=Math.round(vp.height);
        cvs.style.width=(vp.width/dpr)+'px'; cvs.style.height=(vp.height/dpr)+'px';
        body.append(cvs); await page.render({canvasContext:cvs.getContext('2d'),viewport:vp}).promise; }
    }catch(e){ body.innerHTML='<div style="color:#ff9a9a;margin-top:40px">Konnte diese Stimme nicht anzeigen.</div>'; }
  }

  /* ---- Audio-Leiste ---- */
  function ensureAudio(){
    let a=document.getElementById('voiceAudio'); if(a) return a;
    a=document.createElement('div'); a.id='voiceAudio';
    a.innerHTML='<span class="vaname" id="vaName"></span><audio id="vaEl" controls preload="metadata"></audio><span class="vax" id="vaX" title="Schließen">✕</span>';
    document.body.appendChild(a);
    a.querySelector('#vaX').onclick=closeAudio;
    return a;
  }
  function closeAudio(){ const a=document.getElementById('voiceAudio'); if(a){ const el=a.querySelector('#vaEl'); try{ el.pause(); }catch(_){} a.classList.remove('open'); } setActiveChip(null); }
  function showAudio(part){
    injectCSS(); const a=ensureAudio(); a.querySelector('#vaName').textContent=part.fileName||part.role;
    const el=a.querySelector('#vaEl'); el.src=part._url; a.classList.add('open'); try{ el.play().catch(()=>{}); }catch(_){}
  }

  /* ---- Stimmen-Leiste im Betrachter ---- */
  function setActiveChip(id){
    const bar=document.getElementById('voiceBar'); if(!bar) return;
    bar.querySelectorAll('.vc').forEach(c=>c.classList.toggle('on', c.dataset.id===(id||'orig')));
  }
  function refreshVoiceBar(t){
    injectCSS();
    const viewer=document.getElementById('viewer'); if(!viewer) return;
    let bar=document.getElementById('voiceBar');
    const ps = t && t.key ? partsOf(t.key) : [];
    if(!ps.length){ if(bar) bar.remove(); return; }
    if(!bar){ bar=document.createElement('div'); bar.id='voiceBar';
      const vbar=viewer.querySelector('.vbar'); vbar.insertAdjacentElement('afterend', bar); }
    bar.innerHTML='';
    const lbl=document.createElement('span'); lbl.className='vlbl'; lbl.textContent='Stimmen:'; bar.append(lbl);
    // Originalstimme (das eingebaute PDF/die Notiz)
    const orig=document.createElement('button'); orig.className='vc on'; orig.dataset.id='orig';
    orig.textContent = t.isEdit ? 'Notiz' : (t.isLib ? 'Original' : 'Leadsheet');
    orig.onclick=()=>{ closeOverlay(); closeAudio(); setActiveChip(null); }; bar.append(orig);
    ps.forEach(p=>{ const c=document.createElement('button'); c.className='vc'+(p.kind==='audio'?' aud':''); c.dataset.id=p.id;
      c.textContent=(p.kind==='audio'?'♪ ':'')+p.role;
      c.onclick=()=>{ if(p.kind==='audio'){ closeOverlay(); showAudio(p); } else { closeAudio(); showPdf(p); } setActiveChip(p.id); };
      bar.append(c); });
  }

  /* ---- Verwaltung im Bearbeiten-Menü ---- */
  function guessRole(name){ const n=(name||'').toLowerCase();
    for(const r of roles()){ if(r==='Audio') continue; if(n.includes(r.toLowerCase().replace('-',''))||n.includes(r.toLowerCase())) return r; }
    return 'Leadsheet'; }
  function appendPartsUI(card, t){
    if(!card || !t || t.isEdit) return;                 // Notizen ausgenommen
    if(card.querySelector('.partsSec')) return;
    injectCSS();
    const sec=document.createElement('div'); sec.className='partsSec';
    card.append(sec);
    renderSec(sec, t);
  }
  function renderSec(sec, t){
    const ps=partsOf(t.key);
    let html='<div class="lbl" style="margin:0 0 6px">🎼 Stimmen &amp; Audio</div>'
      +'<div class="muted" style="margin:0 0 8px">Weitere Stimmen (PDF) oder ein Arrangement-MP3 zu diesem Stück. Bleiben auf diesem Gerät.</div>';
    if(ps.length){ html+='<div id="pList">'+ps.map(p=>
      '<div class="prow" data-id="'+p.id+'"><span class="prole">'+esc(p.role)+'</span>'
      +'<span class="pfile">'+(p.kind==='audio'?'♪ ':'')+esc(p.fileName||'')+'</span>'
      +'<span class="pdel" title="Entfernen">🗑</span></div>').join('')+'</div>'; }
    html+='<div class="row" style="gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap">'
      +'<select id="pRole" class="txt" style="flex:0 0 auto;width:auto">'+roles().map(r=>'<option>'+esc(r)+'</option>').join('')+'</select>'
      +'<button class="btn" id="pAdd" style="flex:1">＋ Datei hinzufügen</button>'
      +'<input type="file" id="pFile" accept="application/pdf,audio/*,.pdf,.mp3,.m4a,.wav" style="display:none">'
      +'</div>';
    sec.innerHTML=html;
    sec.querySelectorAll('.pdel').forEach(x=>x.onclick=()=>{ const id=x.closest('.prow').dataset.id;
      partDel(id).then(loadParts).then(()=>{ renderSec(sec,t); try{ render(); }catch(e){} if(document.getElementById('viewer').classList.contains('open')&&CURRENT&&CURRENT.key===t.key) refreshVoiceBar(t); }); });
    const file=sec.querySelector('#pFile'), roleSel=sec.querySelector('#pRole');
    sec.querySelector('#pAdd').onclick=()=>file.click();
    file.onchange=()=>{ const f=file.files&&file.files[0]; if(!f) return;
      const isAudio=AUDIO_RX.test(f.name)|| (f.type||'').indexOf('audio')===0;
      const role=isAudio?'Audio':roleSel.value;
      const rec={ id:uid(), tuneKey:t.key, role, kind:isAudio?'audio':'pdf', fileName:f.name, addedAt:Date.now(), blob:f };
      sec.querySelector('#pAdd').textContent='Speichere…';
      partPut(rec).then(loadParts).then(()=>{ renderSec(sec,t); try{ render(); }catch(e){}
        if(document.getElementById('viewer').classList.contains('open')&&CURRENT&&CURRENT.key===t.key) refreshVoiceBar(t); }); };
    // Rolle aus Dateinamen vorschlagen, sobald gewählt (vor dem Ablegen nicht möglich — daher beim Klick)
    file.addEventListener('click',()=>{ /* noop */});
  }

  /* ---- Hooks setzen ---- */
  function boot(){
    injectCSS();
    // openMetaSheet umschließen → Stimmen-Verwaltung anhängen
    if(typeof window.openMetaSheet==='function'){
      const om=window.openMetaSheet;
      window.openMetaSheet=function(t){ const r=om.apply(this,arguments); try{ appendPartsUI(document.getElementById('sheetCard'), t); }catch(e){} return r; };
    }
    // openViewer umschließen → Stimmen-Leiste aufbauen (Overlay/Audio zurücksetzen)
    if(typeof window.openViewer==='function'){
      const ov=window.openViewer;
      window.openViewer=function(t){ const r=ov.apply(this,arguments); try{ closeOverlay(); const a=document.getElementById('voiceAudio'); if(a) a.classList.remove('open'); refreshVoiceBar(t); }catch(e){} return r; };
    }
    // Betrachter schließen → Overlay/Audio mit schließen
    const vc=document.getElementById('vClose'); if(vc) vc.addEventListener('click',()=>{ closeOverlay(); closeAudio(); });
    // Parts laden und Liste auffrischen
    loadParts().then(()=>{ try{ render(); }catch(e){} });
  }
  window.RBParts={ loadParts, refreshVoiceBar, partsOf, _boot:boot };
  if(document.readyState==='loading') window.addEventListener('DOMContentLoaded',boot); else setTimeout(boot,0);
})();

</script>
</body>
</html>
